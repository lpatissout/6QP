<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>6 qui prend ! - Jeu en ligne (mobile-friendly)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { corePlugins: { preflight: true } };
    </script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        h1,h2,h3,h4 { font-family: 'Montserrat', sans-serif; }

        /* Layout: main content + right console */
        #page-wrap { margin-right: 25%; /* reserve space for side console on desktop */ }
        #spectator-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 25%;
            height: 100vh;
            background: #0b0b0b;
            color: #b7f0a7;
            border-left: 1px solid rgba(255,255,255,0.06);
            z-index: 60;
            display: flex;
            flex-direction: column;
        }
        #spectator-header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:8px;
            padding:10px;
            border-bottom:1px solid rgba(255,255,255,0.03);
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        }
        #spectator-console {
            padding: 10px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.2;
        }
        .log-line { margin-bottom:6px; white-space:pre-wrap; word-break:break-word; }
        .log-INFO { color: #b7f0a7; }    /* pale green */
        .log-LOG  { color: #cfe7ff; }    /* pale blue */
        .log-WARN { color: #ffd580; }    /* pale orange */
        .log-ERROR{ color: #ff7a7a; }    /* pale red */
        .log-TIME { color: #8f9bb3; font-size:11px; margin-right:6px; }

        /* Controls */
        .spec-btn { background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); padding:6px 8px; border-radius:6px; color:inherit; cursor:pointer; font-size:12px; }
        .spec-btn.active { background: rgba(255,255,255,0.04); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.4); }

        /* Debug panel in-game */
        .debug-panel { font-family: ui-monospace, "Roboto Mono", monospace; font-size:12px; }

        /* Mobile: hide spectator visually but keep log collection */
        @media (max-width: 900px) {
            #page-wrap { margin-right: 0; }
            #spectator-panel { display: none !important; }
            /* Make UI more compact on mobile */
            .max-w-6xl { max-width: 100% !important; }
        }

        /* visual selection halo for cards */
        .card-selected {
            box-shadow: 0 0 0 4px rgba(99,102,241,0.18), 0 6px 18px rgba(0,0,0,0.12);
            transform: scale(1.03);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-100 to-orange-200 min-h-screen">

<!-- Main content -->
<div id="page-wrap">
    <div id="app"></div>
</div>

<!-- SPECTATOR PANEL (25% right side) - hidden on mobile via CSS -->
<div id="spectator-panel" role="region" aria-label="Console spectateur">
    <div id="spectator-header">
        <div style="display:flex; gap:8px; align-items:center;">
            <strong style="color:#fff;">Spectateur</strong>
            <span style="font-size:12px; color:#9fb0c8;">(logs globaux)</span>
        </div>

        <div style="display:flex; gap:6px; align-items:center;">
            <button id="filter-all" class="spec-btn active">All</button>
            <button id="filter-log" class="spec-btn">Log</button>
            <button id="filter-info" class="spec-btn">Info</button>
            <button id="filter-warn" class="spec-btn">Warn</button>
            <button id="filter-error" class="spec-btn">Error</button>
            <button id="clear-logs" class="spec-btn" title="Clear logs">Clear</button>
            <button id="download-logs" class="spec-btn" title="Télécharger les logs">Download</button>
        </div>
    </div>

    <div id="spectator-console" aria-live="polite" tabindex="0"></div>
</div>

<script>
/* ---------------- SPECTATOR CONSOLE (captures console.*) ---------------- */
(function(){
    window.__spectator = window.__spectator || { logs: [], max: 5000, filter: 'all' };

    function fmtArgs(args) {
        return args.map(a => {
            try {
                if (typeof a === 'object') return JSON.stringify(a);
                return String(a);
            } catch (e) { return '[object]'; }
        }).join(' ');
    }

    function renderLogs() {
        const container = document.getElementById('spectator-console');
        if (!container) return;
        const f = window.__spectator.filter;
        const visible = window.__spectator.logs.filter(l => f === 'all' ? true : l.level === f.toUpperCase());
        container.innerHTML = visible.map(l => {
            const time = `<span class="log-TIME">[${l.time}]</span>`;
            const level = `<span class="log-${l.level}">${l.level}</span>`;
            const text = `<span class="log-${l.level}" style="margin-left:6px;">${l.text}</span>`;
            return `<div class="log-line">${time} ${level} ${text}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    function pushLog(level, ...args) {
        const time = new Date().toLocaleTimeString();
        const text = fmtArgs(args);
        window.__spectator.logs.push({ time, level: level.toUpperCase(), text });
        if (window.__spectator.logs.length > window.__spectator.max) window.__spectator.logs.shift();
        renderLogs();
        if (originalConsole[level]) originalConsole[level].apply(console, args);
    }

    const originalConsole = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console)
    };

    console.log = function(...args){ pushLog('log', ...args); };
    console.info = function(...args){ pushLog('info', ...args); };
    console.warn = function(...args){ pushLog('warn', ...args); };
    console.error = function(...args){ pushLog('error', ...args); };

    document.addEventListener('DOMContentLoaded', () => {
        const btnAll = document.getElementById('filter-all');
        const btnLog = document.getElementById('filter-log');
        const btnInfo = document.getElementById('filter-info');
        const btnWarn = document.getElementById('filter-warn');
        const btnError = document.getElementById('filter-error');
        const btnClear = document.getElementById('clear-logs');
        const btnDownload = document.getElementById('download-logs');

        function setActive(button) {
            [btnAll, btnLog, btnInfo, btnWarn, btnError].forEach(b => b && b.classList.remove('active'));
            if (button) button.classList.add('active');
        }

        btnAll && btnAll.addEventListener('click', () => { window.__spectator.filter = 'all'; setActive(btnAll); renderLogs(); });
        btnLog && btnLog.addEventListener('click', () => { window.__spectator.filter = 'log'; setActive(btnLog); renderLogs(); });
        btnInfo && btnInfo.addEventListener('click', () => { window.__spectator.filter = 'info'; setActive(btnInfo); renderLogs(); });
        btnWarn && btnWarn.addEventListener('click', () => { window.__spectator.filter = 'warn'; setActive(btnWarn); renderLogs(); });
        btnError && btnError.addEventListener('click', () => { window.__spectator.filter = 'error'; setActive(btnError); renderLogs(); });

        btnClear && btnClear.addEventListener('click', () => { window.__spectator.logs = []; renderLogs(); });

        btnDownload && btnDownload.addEventListener('click', () => {
            const text = window.__spectator.logs.map(l => `[${l.time}] ${l.level} ${l.text}`).join('\n');
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quiprend-logs-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });

        renderLogs();
    });

    window.spectatorPush = function(level, ...args) {
        if (!['log','info','warn','error'].includes(level)) level = 'log';
        pushLog(level, ...args);
    };

})(); // end spectator
/* ---------------- END SPECTATOR ---------------- */
</script>

<script>
/* ------------------ Jeu complet avec mobile-friendly interaction ------------------ */

const firebaseConfig = {
  apiKey: "AIzaSyC2YfNviAE_jDD0wT7TmfZBeOaKqjJdJuQ",
  authDomain: "quiprend-879a6.firebaseapp.com",
  databaseURL: "https://quiprend-879a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiprend-879a6",
  storageBucket: "quiprend-879a6.firebasestorage.app",
  messagingSenderId: "476103541469",
  appId: "1:476103541469:web:3a0ac76f9bde94b1745134"
};

let database = null;
try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    console.info('Firebase initialized ✅', { projectId: firebaseConfig.projectId });
} catch (e) {
    console.error('Erreur Firebase:', e);
    alert('Erreur Firebase: ' + e.message);
}

/* Detect mobile/tablet - used to adapt interactions and hide debug UI */
const isMobile = /Mobi|Android|iPhone|iPad|Tablet/i.test(navigator.userAgent) || window.innerWidth < 900;
console.info('Device detection', { isMobile });

let state = {
    screen: 'home',
    gameCode: '',
    playerName: '',
    joinCode: '',
    game: null,
    playerId: null,
    selectedCard: null,
    chatMessage: '',
    showChat: false,
    copied: false,
    debugLogs: [],
    showDebug: false
};

let gameRef = null;

// small debug logger kept in-state (hidden on mobile)
function debugLog(msg, payload = null) {
    const t = new Date().toLocaleTimeString();
    const item = { time: t, msg, payload: payload ? JSON.stringify(payload) : null };
    state.debugLogs.push(item);
    if (state.debugLogs.length > 100) state.debugLogs.shift();
    console.log(`[DEBUG ${t}] ${msg}`, payload || '');
}

// helpers
const generateGameCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
const calculateHeads = (card) => {
    if (card === 55) return 7;
    if (card % 11 === 0) return 5;
    if (card % 10 === 0) return 3;
    if (card % 5 === 0) return 2;
    return 1;
};
const getCardColor = (card) => {
    if (card <= 26) return 'bg-blue-400';
    if (card <= 52) return 'bg-green-400';
    if (card <= 78) return 'bg-yellow-400';
    return 'bg-red-400';
};
const shuffleDeck = () => {
    const deck = Array.from({ length: 104 }, (_, i) => i + 1);
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    return deck;
};

const saveGame = async (data) => {
    if (!database) { console.warn('saveGame: database missing'); return; }
    if (data.pendingCard === undefined) data.pendingCard = null;
    if (data.waitingForRowChoice === undefined) data.waitingForRowChoice = null;

    try {
        console.log('Saving to Firebase', { gameCode: state.gameCode, rowsCount: data.rows ? data.rows.map(r => r.length) : null });
        await database.ref('games/' + state.gameCode).set(data);
        state.game = data;
        console.info('Save completed for game', state.gameCode);
    } catch (err) {
        console.error('Erreur lors de la sauvegarde Firebase:', err);
    }
};

const subscribeToGame = (code) => {
    if (!database) { console.warn('subscribeToGame: db missing'); return; }
    if (gameRef) gameRef.off();
    gameRef = database.ref('games/' + code);
    gameRef.on('value', async (snap) => {
        const data = snap.val();
        if (!data) {
            console.warn('subscribeToGame: no game found', code);
            return;
        }
        debugLog('Firebase update received', { status: data.status, waitingForRowChoice: data.waitingForRowChoice });
        const oldStatus = state.game ? state.game.status : null;
        state.game = data;

        if (data.status === 'playing') {
            state.screen = 'game';
            debugLog('Switching screen to game');
        }

        // If we transitioned inside playing and turn not resolved: check if need to resolve
        if (state.game.status === 'playing' && !state.game.turnResolved && oldStatus === 'playing') {
            const allPlayed = state.game.players.every(p => p.playedCard !== null);
            debugLog('Checking allPlayed', { allPlayed });
            if (allPlayed) {
                await resolveTurn();
            }
        }

        render();
    });
};

const createGame = async () => {
    if (!state.playerName.trim() || !database) { alert('Entrez un pseudo !'); return; }
    const code = generateGameCode();
    const pid = Math.random().toString(36).substring(7);
    state.gameCode = code;
    state.playerId = pid;

    const initial = {
        code,
        status: 'waiting',
        hostId: pid,
        players: [{ id: pid, name: state.playerName, score: 0, ready: false, hand: [], playedCard: null }],
        rows: [],
        round: 0,
        chat: [],
        currentTurn: 0,
        maxRounds: 6,
        turnResolved: false,
        waitingForRowChoice: null,
        pendingCard: null
    };

    debugLog('Creating game', { code, host: state.playerName });
    await saveGame(initial);
    subscribeToGame(code);
    state.screen = 'lobby';
    render();
};

const joinGame = async () => {
    if (!state.playerName.trim() || !state.joinCode.trim() || !database) { alert('Entrez pseudo et code !'); return; }
    const normalized = state.joinCode.toUpperCase();
    debugLog('Joining', { joinCode: normalized, player: state.playerName });
    const snap = await database.ref('games/' + normalized).once('value');
    const game = snap.val();
    if (!game) { alert('Partie introuvable !'); return; }
    if (game.status !== 'waiting') { alert('Partie déjà commencée !'); return; }
    const pid = Math.random().toString(36).substring(7);
    game.players.push({ id: pid, name: state.playerName, score: 0, ready: false, hand: [], playedCard: null });
    state.gameCode = normalized;
    state.playerId = pid;
    await saveGame(game);
    subscribeToGame(state.gameCode);
    state.screen = 'lobby';
    render();
};

const toggleReady = async () => {
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('toggleReady: player not found'); return; }
    p.ready = !p.ready;
    debugLog('Toggling ready', { player: p.name, ready: p.ready });
    await saveGame(state.game);
};

const startGame = async () => {
    if (state.game.hostId !== state.playerId || state.game.players.length < 2) { console.warn('startGame: unauthorized or not enough players'); return; }
    if (!state.game.players.every(p => p.ready)) { alert('Tous doivent être prêts !'); return; }

    try {
        debugLog('Starting game', { players: state.game.players.length });
        const deck = shuffleDeck();
        const cardsNeeded = 4 + (state.game.players.length * 10);
        if (deck.length < cardsNeeded) throw new Error('Pas assez de cartes');

        state.game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
        deck.splice(0,4);

        state.game.players.forEach(p => {
            p.hand = deck.splice(0,10).sort((a,b)=>a-b);
            p.playedCard = null;
            debugLog('Dealt', { player: p.name, hand: p.hand });
        });

        state.game.status = 'playing';
        state.game.round = 1;
        state.game.currentTurn = 1;
        state.game.turnResolved = false;
        state.game.waitingForRowChoice = null;
        state.game.pendingCard = null;

        await saveGame(state.game);
        state.screen = 'game';
        render();
    } catch (err) {
        debugLog('Error starting game', { err: err.message });
        alert('Erreur au démarrage : ' + err.message);
    }
};

/* PLAY CARD:
   - On desktop: two-step (select then confirm) retained via handleCard
   - On mobile: single tap => immediate playCard(card)
   - Crucial: allow changing playedCard while turn not resolved (so players can change mind)
*/
const playCard = async (card) => {
    if (!state.game) { console.warn('playCard: no game'); return; }
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('playCard: player not found'); return; }

    // If turn is locked (waitingForRowChoice set) or game finished, do not allow change
    if (state.game.waitingForRowChoice || state.game.turnResolved || state.game.status !== 'playing') {
        console.warn('playCard: turn locked or game not playing');
        return;
    }

    // Set/override player's playedCard (allows changing until turn resolution)
    p.playedCard = card;
    p.hand = p.hand.filter(c => c !== card); // remove card from hand (it's considered played)
    // but if player changes later we'll re-add previous card in DB resolution (we must ensure consistency)
    debugLog('Player selected/played card', { player: p.name, card });

    await saveGame(state.game);
    state.selectedCard = null;
    render();
};

/* RESOLVE TURN: same logic but with robust checks and logs */
const resolveTurn = async () => {
    debugLog('resolveTurn called');
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    if (!game) { console.warn('resolveTurn: no game snapshot'); return; }

    game.turnResolved = true;
    const plays = game.players
        .filter(p => p.playedCard !== null)
        .map(p => ({ pid: p.id, card: p.playedCard }))
        .sort((a,b)=>a.card - b.card);

    debugLog('Plays order', { plays: plays.map(x=>x.card) });

    // First pass: check any player whose card is too small -> they must choose a row
    for (const play of plays) {
        const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] }))
            .filter(x=>x.diff > 0);
        debugLog('validRows check', { play, validRows });

        if (!validRows.length) {
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            debugLog('Need player to choose row', { playerId: play.pid, card: play.card });
            return;
        }
    }

    // If no forced choice, resolve normally
    await resolveAllPlays(game);
};

const resolveAllPlays = async (game) => {
    const plays = game.players
        .filter(p => p.playedCard !== null)
        .map(p => ({ pid: p.id, card: p.playedCard }))
        .sort((a,b)=>a.card - b.card);

    debugLog('resolveAllPlays', { cards: plays.map(p=>p.card) });

    for (const play of plays) {
        const p = game.players.find(x => x.id === play.pid);
        const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] })).filter(x=>x.diff > 0);

        if (!validRows.length) {
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            debugLog('Player must choose row during resolveAllPlays', { player: p.name, card: play.card });
            return;
        }

        const chosenRow = validRows.reduce((min, cur) => cur.diff < min.diff ? cur : min);
        if (game.rows[chosenRow.i].length === 5) {
            const penaltyPoints = game.rows[chosenRow.i].reduce((s,c)=>s+calculateHeads(c),0);
            p.score += penaltyPoints;
            debugLog('6th card rule', { player: p.name, penaltyPoints, rowIndex: chosenRow.i });
            game.rows[chosenRow.i] = [play.card];
        } else {
            game.rows[chosenRow.i].push(play.card);
            debugLog('Card placed', { player: p.name, card: play.card, rowIndex: chosenRow.i });
        }

        // Allow the player to have playedCard nulled after placement
        p.playedCard = null;
    }

    // Advance turn/round
    game.currentTurn++;
    if (game.currentTurn > 10) {
        game.round++;
        if (game.round > game.maxRounds) {
            game.status = 'finished';
            debugLog('Game finished', { gameCode: state.gameCode });
        } else {
            const deck = shuffleDeck();
            game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
            deck.splice(0,4);
            game.players.forEach(p => { p.hand = deck.splice(0,10).sort((a,b)=>a-b); });
            game.currentTurn = 1;
            debugLog('New round', { round: game.round });
        }
    }

    game.turnResolved = false;
    game.waitingForRowChoice = null;
    game.pendingCard = null;
    await saveGame(game);
};

const sendMessage = async () => {
    if (!state.chatMessage.trim()) return;
    const p = state.game.players.find(x => x.id === state.playerId);
    state.game.chat = state.game.chat || [];
    const entry = { player: p.name, msg: state.chatMessage, time: new Date().toLocaleTimeString() };
    state.game.chat.push(entry);
    debugLog('Chat', entry);
    state.chatMessage = '';
    await saveGame(state.game);
    render();
};

const copyLink = () => {
    const link = window.location.origin + window.location.pathname + '?join=' + state.gameCode;
    navigator.clipboard.writeText(link);
    state.copied = true;
    debugLog('Link copied', link);
    render();
    setTimeout(()=>{ state.copied = false; render(); }, 2000);
};

const leaveGame = () => {
    if (gameRef) gameRef.off();
    debugLog('Leave game', { playerId: state.playerId });
    state.screen = 'home';
    state.game = null;
    state.gameCode = '';
    render();
};

const chooseRow = async (rowIndex) => {
    debugLog('chooseRow', { rowIndex, playerId: state.playerId });
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    if (!game) { console.warn('chooseRow: game not found'); return; }
    if (game.waitingForRowChoice !== state.playerId) {
        debugLog('chooseRow: not authorized', { waitingFor: game.waitingForRowChoice });
        return;
    }

    const p = game.players.find(x => x.id === state.playerId);
    const penaltyRow = game.rows[rowIndex];
    const penaltyPoints = penaltyRow.reduce((s,c)=>s+calculateHeads(c),0);
    p.score += penaltyPoints;
    debugLog('Picked up row', { player: p.name, rowIndex, penaltyPoints });
    game.rows[rowIndex] = [game.pendingCard];
    p.playedCard = null;
    await resolveAllPlays(game);
};
window.chooseRow = chooseRow;

/* CARD UI generator */
const Card = (num, sel, click, dis, small) => {
    const h = calculateHeads(num);
    const col = getCardColor(num);
    const sz = small ? 'w-12 h-16 text-xs' : 'w-16 h-24 text-sm';
    // We'll add a data-card attribute so we can style selected cards easily if needed
    return `<button ${click ? 'onclick="handleCard(' + num + ')"' : ''} ${dis ? 'disabled' : ''} data-card="${num}" class="${sz} ${col} text-white rounded-lg shadow-md flex flex-col items-center justify-between p-1 transition ${sel ? 'card-selected' : ''} ${!dis && !sel ? 'hover:scale-105 cursor-pointer' : ''} ${dis ? 'opacity-50' : ''} font-bold"><span class="text-xl">${num}</span><div>${'🐮'.repeat(h)}</div></button>`;
};

/* HANDLE CARD:
   - If mobile: single tap => immediate playCard (and can change)
   - If desktop: two-step (select then second click to confirm)
*/
window.handleCard = (c) => {
    if (!state.game) return;
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('handleCard: player not found'); return; }

    if (isMobile) {
        // immediate play (or override)
        debugLog('handleCard (mobile)', { card: c });
        playCard(c);
        return;
    }

    // desktop behavior: two-step
    if (state.selectedCard === c) {
        debugLog('handleCard (desktop) - confirming', { card: c });
        playCard(c);
    } else {
        state.selectedCard = c;
        debugLog('handleCard (desktop) - selected', { card: c });
        render();
    }
};

/* RENDER function (single-file) */
const render = () => {
    const app = document.getElementById('app');

    if (state.screen === 'home') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h1 class="text-5xl font-bold text-center mb-2 text-orange-600">🐮 6 qui prend !</h1>
                    <p class="text-center text-gray-600 mb-8">Jeu de cartes multijoueur en ligne</p>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Votre pseudo</label>
                        <input type="text" value="${state.playerName}" oninput="state.playerName=this.value" 
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none"
                               placeholder="Entrez votre nom">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <button onclick="createGame()" 
                                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">
                            🎮 Créer une partie
                        </button>
                        <button onclick="state.screen='join'; render()" 
                                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">
                            🔗 Rejoindre une partie
                        </button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg">
                        <h3 class="font-bold mb-2">📖 Règles rapides :</h3>
                        <ul class="text-sm space-y-1 text-gray-700">
                            <li>• Chaque joueur joue 1 carte par tour</li>
                            <li>• Les cartes sont placées dans l'ordre croissant</li>
                            <li>• Si vous êtes le 6ème d'une rangée, vous ramassez les 5 cartes (points négatifs 🐮)</li>
                            <li>• Le joueur avec le moins de points gagne !</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
        return;
    }

    if (state.screen === 'join') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Rejoindre une partie</h2>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Code de la partie</label>
                        <input type="text" value="${state.joinCode}" oninput="state.joinCode=this.value.toUpperCase()" 
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none uppercase"
                               placeholder="Ex: ABC123">
                    </div>

                    <button onclick="joinGame()" 
                            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition shadow-lg mb-4">
                        Rejoindre
                    </button>

                    <button onclick="state.screen='home'; render()" 
                            class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-6 rounded-lg transition">
                        Retour
                    </button>
                </div>
            </div>
        `;
        return;
    }

    if (state.screen === 'lobby') {
        const isHost = state.game.hostId === state.playerId;
        const canStart = isHost && state.game.players.length >= 2 && state.game.players.every(p => p.ready);

        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-orange-600">Salon d'attente</h2>
                        <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                            Quitter
                        </button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg mb-6 flex justify-between items-center">
                        <div>
                            <span class="text-sm text-gray-600">Code de la partie :</span>
                            <span class="text-2xl font-bold ml-2">${state.gameCode}</span>
                        </div>
                        <button onclick="copyLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                            ${state.copied ? '✓ Copié !' : '📋 Copier le lien'}
                        </button>
                    </div>

                    <div class="mb-6">
                        <h3 class="font-bold mb-3">Joueurs (${state.game.players.length}) :</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${state.game.players.map(p => `
                                <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                                    <div>
                                        <span class="font-semibold">${p.name}</span>
                                        ${p.id === state.game.hostId ? '<span class="text-xs bg-orange-500 text-white px-2 py-1 rounded ml-2">Hôte</span>' : ''}
                                    </div>
                                    <span class="text-2xl">${p.ready ? '✅' : '⏳'}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="toggleReady()" 
                                class="flex-1 ${state.game.players.find(x => x.id === state.playerId).ready ? 'bg-gray-400' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-3 px-6 rounded-lg transition">
                            ${state.game.players.find(x => x.id === state.playerId).ready ? 'Pas prêt' : 'Je suis prêt !'}
                        </button>
                        ${isHost ? `
                            <button onclick="startGame()" ${!canStart ? 'disabled' : ''}
                                    class="flex-1 ${canStart ? 'bg-orange-500 hover:bg-orange-600' : 'bg-gray-300'} text-white font-bold py-3 px-6 rounded-lg transition ${!canStart ? 'cursor-not-allowed' : ''}">
                                🚀 Lancer la partie
                            </button>
                        ` : ''}
                    </div>

                    ${!canStart && isHost ? '<p class="text-center text-red-500 mt-2 text-sm">Tous les joueurs doivent être prêts (min. 2 joueurs)</p>' : ''}
                </div>
            </div>
        `;
        return;
    }

    if (state.screen === 'game') {
        const me = state.game.players.find(x => x.id === state.playerId);
        const waitingPlayers = state.game.players.filter(p => p.playedCard === null).map(p => p.name);

        // Render debug only on desktop/tablet (hidden on mobile by CSS)
        const debugVisible = !isMobile && state.showDebug;

        if (state.game.status === 'finished') {
            const winner = state.game.players.reduce((min, p) => p.score < min.score ? p : min);
            app.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8 text-center">
                        <h1 class="text-5xl font-bold mb-6 text-green-600">🎉 Partie terminée !</h1>
                        <h2 class="text-3xl mb-8">🏆 ${winner.name} gagne avec ${winner.score} points !</h2>

                        <div class="mb-8">
                            <h3 class="font-bold mb-4">Classement final :</h3>
                            ${state.game.players.sort((a,b)=>a.score-b.score).map((p,i)=>`
                                <div class="bg-gray-100 p-4 rounded-lg mb-2 flex justify-between items-center">
                                    <span class="text-2xl">${i===0?'🥇':i===1?'🥈':i===2?'🥉':''} ${p.name}</span>
                                    <span class="font-bold text-xl">${p.score} 🐮</span>
                                </div>
                            `).join('')}
                        </div>

                        <button onclick="leaveGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-lg">
                            Retour à l'accueil
                        </button>
                    </div>
                </div>
            `;
            return;
        }

        app.innerHTML = `
            <div class="container mx-auto px-4 py-4">
                <div class="max-w-6xl mx-auto">
                    <!-- Header -->
                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4 flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-orange-600">Manche ${state.game.round}/${state.game.maxRounds} - Tour ${state.game.currentTurn}/10</h2>
                            <p class="text-sm text-gray-600">Code: ${state.gameCode}</p>
                        </div>
                        <div class="flex gap-2">
                            ${!isMobile ? `<button onclick="state.showDebug = !state.showDebug; render()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">${state.showDebug ? '📊 Masquer Debug' : '🔍 Debug'}</button>` : ''}
                            <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">Quitter</button>
                        </div>
                    </div>

                    ${debugVisible ? `
                    <div class="bg-gray-900 text-green-400 rounded-lg shadow-lg p-4 mb-4 font-mono text-xs max-h-96 overflow-y-auto debug-panel">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-white font-bold">📊 Console de Debug</h3>
                            <button onclick="state.debugLogs = []; render()" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Effacer</button>
                        </div>
                        <div>
                            ${state.debugLogs.length === 0 ? '<p class="text-gray-500">Aucun log...</p>' : ''}
                            ${state.debugLogs.map(l => `
                                <div class="border-b border-gray-700 pb-1">
                                    <span class="text-gray-500">[${l.time}]</span>
                                    <span class="text-yellow-400">${l.msg}</span>
                                    ${l.payload ? `<div class="pl-4 text-blue-400">${l.payload}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    <!-- Scores -->
                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4">
                        <div class="grid grid-cols-2 md:grid-cols-${state.game.players.length} gap-2">
                            ${state.game.players.map(p => `
                                <div class="text-center p-2 rounded ${p.id === state.playerId ? 'bg-orange-100' : 'bg-gray-100'}">
                                    <div class="font-semibold">${p.name}</div>
                                    <div class="text-2xl font-bold">${p.score} 🐮</div>
                                    ${p.playedCard ? '<div class="text-green-500 text-sm">✓ Joué</div>' : '<div class="text-gray-400 text-sm">En attente...</div>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Rows -->
                    <div class="bg-white rounded-lg shadow-lg p-6 mb-4">
                        <h3 class="font-bold mb-4 text-lg">Rangées de cartes :</h3>
                        ${state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId ? 
                            '<div class="bg-orange-100 border-2 border-orange-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-orange-700">⚠️ Votre carte est trop petite ! Choisissez une rangée à ramasser en cliquant dessus :</p></div>' 
                            : state.game.waitingForRowChoice ? 
                            '<div class="bg-blue-100 border-2 border-blue-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-blue-700">⏳ ' + (state.game.players.find(p=>p.id===state.game.waitingForRowChoice)?.name || 'Joueur') + ' doit choisir une rangée...</p></div>'
                            : ''}
                        <div class="space-y-3">
                            ${state.game.rows.map((row,i) => {
                                const totalHeads = row.reduce((sum,c)=>sum+calculateHeads(c),0);
                                const canClick = state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId;
                                return `
                                <div class="flex items-center gap-2 ${canClick ? 'cursor-pointer hover:bg-orange-50 border-2 border-transparent hover:border-orange-500 rounded-lg p-2 transition' : ''}" ${canClick ? 'onclick="chooseRow(' + i + ')"' : ''}>
                                    <span class="font-bold text-gray-600 min-w-[40px]">R${i+1}:</span>
                                    <div class="flex gap-1 flex-wrap flex-1">
                                        ${row.map(c => Card(c, false, false, true, true)).join('')}
                                    </div>
                                    <span class="text-sm font-semibold text-gray-700 bg-gray-100 px-3 py-1 rounded">${row.length}/5 | ${totalHeads} 🐮</span>
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <!-- Player hand -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h3 class="font-bold mb-4 text-lg">Votre main :</h3>
                        ${me.playedCard ? `
                            <div class="text-center py-8">
                                <p class="text-xl mb-4">✓ Vous avez joué votre carte : ${me.playedCard}</p>
                                <p class="text-gray-600">En attente des autres joueurs...${waitingPlayers.length>0 ? `<br><span class="text-sm text-gray-500">Attente de: ${waitingPlayers.join(', ')}</span>` : ''}</p>
                                ${!isMobile ? '<p class="text-sm text-gray-500 mt-2">Sur desktop, clic sur la carte pour confirmer / changer (avant résolution)</p>' : '<p class="text-sm text-gray-500 mt-2">Tapez une autre carte pour changer tant que la manche n\'est pas résolue</p>'}
                            </div>
                        ` : `
                            <div class="flex gap-2 flex-wrap justify-center">
                                ${me.hand.map(c => Card(c, state.selectedCard === c || me.playedCard === c, true, false, false)).join('')}
                            </div>
                            <p class="text-center mt-4 text-sm text-gray-600">${isMobile ? 'Tapez une carte pour la jouer (vous pouvez encore la changer tant que les autres n\'ont pas joué).' : 'Cliquez une première fois pour sélectionner puis clique à nouveau pour confirmer.'}</p>
                        `}
                    </div>
                </div>
            </div>
        `;
    }
};

/* Initialize app: parse join param and render */
document.addEventListener('DOMContentLoaded', () => {
    const p = new URLSearchParams(window.location.search);
    const j = p.get('join');
    if (j) state.joinCode = j;
    console.info('App loaded', { joinParam: j, isMobile });
    render();
});
</script>
</body>
</html>
