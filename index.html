<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>6 qui prend !</title>

    <!-- External dependencies: Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { corePlugins: { preflight: true } };
    </script>

    <!-- External dependencies: Firebase for real-time database -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- Custom styles: Links to the local CSS file for game-specific styling -->
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- Main page content wrapper (reserves space for spectator panel) -->
    <div id="page-wrap">
        <div id="app"></div>
    </div>

    <!-- Spectator panel for logs and debugging -->
    <div id="spectator-panel" role="region" aria-label="Console spectateur">
        <div id="spectator-header">
            <div style="display: flex; gap: 8px; align-items: center;">
                <strong style="color: #fff;">6 qui prend — Spectateur</strong>
                <span style="font-size: 12px; color: #9fb0c8;">(logs globaux)</span>
            </div>
            <div style="display: flex; gap: 6px; align-items: center;">
                <button id="filter-all" class="spec-btn active">All</button>
                <button id="filter-log" class="spec-btn">Log</button>
                <button id="filter-info" class="spec-btn">Info</button>
                <button id="filter-warn" class="spec-btn">Warn</button>
                <button id="filter-error" class="spec-btn">Error</button>
                <button id="clear-logs" class="spec-btn" title="Clear logs">Clear</button>
                <button id="download-logs" class="spec-btn" title="Télécharger les logs">Download</button>
                <button id="collapse-spec" class="spec-btn" title="Masquer console">Collapse</button>
            </div>
        </div>
        <div id="spectator-console" aria-live="polite" tabindex="0"></div>
    </div>
    <button id="spectator-collapsed" title="Afficher console">Logs ▶</button>

    <!-- Scripts: Load spectator first (for logging), then game logic -->
    <!-- This ensures spectator.js initializes the console before game.js uses it -->
    <script src="js/spectator.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
