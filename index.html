<script>
// ---------------- SPECTATOR CONSOLE (global, captures console.*) ----------------
(function(){
    // Ensure an in-page log store
    window.__spectator = window.__spectator || {
        logs: [],   // {time, level, text}
        max: 5000,
        filter: 'all'
    };

    // helper formatting
    function fmtArgs(args) {
        return args.map(a => {
            try {
                if (typeof a === 'object') return JSON.stringify(a);
                return String(a);
            } catch (e) { return '[object]'; }
        }).join(' ');
    }

    // render function
    function renderLogs() {
        const container = document.getElementById('spectator-console');
        if (!container) return;
        const f = window.__spectator.filter;
        const visible = window.__spectator.logs.filter(l => f === 'all' ? true : l.level === f.toUpperCase());
        container.innerHTML = visible.map(l => {
            const time = `<span class="log-TIME">[${l.time}]</span>`;
            const level = `<span class="log-${l.level}">${l.level}</span>`;
            const text = `<span class="log-${l.level}" style="margin-left:6px;">${l.text}</span>`;
            return `<div class="log-line">${time} ${level} ${text}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    // push a log
    function pushLog(level, ...args) {
        const time = new Date().toLocaleTimeString();
        const text = fmtArgs(args);
        window.__spectator.logs.push({ time, level: level.toUpperCase(), text });
        // keep within max
        if (window.__spectator.logs.length > window.__spectator.max) window.__spectator.logs.shift();
        renderLogs();
        // keep forwarding to original console as well (to devtools)
        if (originalConsole[level]) originalConsole[level].apply(console, args);
    }

    // save original console methods
    const originalConsole = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console)
    };

    // override console methods
    console.log = function(...args){ pushLog('log', ...args); };
    console.info = function(...args){ pushLog('info', ...args); };
    console.warn = function(...args){ pushLog('warn', ...args); };
    console.error = function(...args){ pushLog('error', ...args); };

    // Filters and controls
    document.addEventListener('DOMContentLoaded', () => {
        const btnAll = document.getElementById('filter-all');
        const btnLog = document.getElementById('filter-log');
        const btnInfo = document.getElementById('filter-info');
        const btnWarn = document.getElementById('filter-warn');
        const btnError = document.getElementById('filter-error');
        const btnClear = document.getElementById('clear-logs');
        const btnDownload = document.getElementById('download-logs');

        function setActive(button) {
            [btnAll, btnLog, btnInfo, btnWarn, btnError].forEach(b => b.classList.remove('active'));
            if (button) button.classList.add('active');
        }

        btnAll.addEventListener('click', () => { window.__spectator.filter = 'all'; setActive(btnAll); renderLogs(); });
        btnLog.addEventListener('click', () => { window.__spectator.filter = 'log'; setActive(btnLog); renderLogs(); });
        btnInfo.addEventListener('click', () => { window.__spectator.filter = 'info'; setActive(btnInfo); renderLogs(); });
        btnWarn.addEventListener('click', () => { window.__spectator.filter = 'warn'; setActive(btnWarn); renderLogs(); });
        btnError.addEventListener('click', () => { window.__spectator.filter = 'error'; setActive(btnError); renderLogs(); });

        btnClear.addEventListener('click', () => { window.__spectator.logs = []; renderLogs(); });

        btnDownload.addEventListener('click', () => {
            const text = window.__spectator.logs.map(l => `[${l.time}] ${l.level} ${l.text}`).join('\n');
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quiprend-logs-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        });

        // initial render
        renderLogs();
    });

    // expose utility to push custom structured logs
    window.spectatorPush = function(level, ...args) {
        if (!['log','info','warn','error'].includes(level)) level = 'log';
        pushLog(level, ...args);
    };

})(); // end spectator
// ---------------- END SPECTATOR ----------------
</script>

<script>
/* ------------------ Jeu (ton code) ------------------ */
/* J'ai intégré ici tout ton code existant mais en gardant/ajoutant des console.log pertinents.
   Les console.log seront automatiquement capturés et affichés dans la console latérale. */

const firebaseConfig = {
  apiKey: "AIzaSyC2YfNviAE_jDD0wT7TmfZBeOaKqjJdJuQ",
  authDomain: "quiprend-879a6.firebaseapp.com",
  databaseURL: "https://quiprend-879a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiprend-879a6",
  storageBucket: "quiprend-879a6.firebasestorage.app",
  messagingSenderId: "476103541469",
  appId: "1:476103541469:web:3a0ac76f9bde94b1745134"
};

let database = null;

try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    console.info('Firebase initialized', { projectId: firebaseConfig.projectId });
} catch (e) {
    console.error('Erreur Firebase: ', e);
    alert('Erreur Firebase: ' + e.message);
}

let state = {
    screen: 'home',
    gameCode: '',
    playerName: '',
    joinCode: '',
    game: null,
    playerId: null,
    selectedCard: null,
    chatMessage: '',
    showChat: false,
    copied: false,
    waitingForRowChoice: false,
    rowChoicePlayerId: null
};

let gameRef = null;

const generateGameCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
const calculateHeads = (card) => {
    if (card === 55) return 7;
    if (card % 11 === 0) return 5;
    if (card % 10 === 0) return 3;
    if (card % 5 === 0) return 2;
    return 1;
};
const getCardColor = (card) => {
    if (card <= 26) return 'bg-blue-400';
    if (card <= 52) return 'bg-green-400';
    if (card <= 78) return 'bg-yellow-400';
    return 'bg-red-400';
};
const shuffleDeck = () => {
    const deck = Array.from({ length: 104 }, (_, i) => i + 1);
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    return deck;
};

const saveGame = async (data) => {
    if (!database) {
        console.warn('saveGame abort: database not initialized');
        return;
    }

    if (data.pendingCard === undefined) data.pendingCard = null;
    if (data.waitingForRowChoice === undefined) data.waitingForRowChoice = null;

    if (data.rows && data.rows.length > 0) {
        for (let i = 0; i < data.rows.length; i++) {
            for (let j = 0; j < data.rows[i].length; j++) {
                if (data.rows[i][j] === undefined) {
                    console.error(`ERREUR: Carte undefined détectée à rows[${i}][${j}]`);
                    console.error('Données complètes:', JSON.stringify(data.rows));
                    throw new Error(`Carte undefined à la position [${i}][${j}]`);
                }
            }
        }
    }

    try {
        console.log('Saving to Firebase', { gameCode: state.gameCode, rowsCount: data.rows ? data.rows.map(r => r.length) : null });
        await database.ref('games/' + state.gameCode).set(data);
        state.game = data;
        console.info('Save completed for game', state.gameCode);
    } catch (err) {
        console.error('Erreur lors de la sauvegarde Firebase:', err);
    }
};

const subscribeToGame = (code) => {
    if (!database) {
        console.warn('subscribeToGame abort: database not initialized');
        return;
    }
    if (gameRef) gameRef.off();
    gameRef = database.ref('games/' + code);
    gameRef.on('value', async (snap) => {
        const data = snap.val();
        if (!data) {
            console.warn('subscribeToGame: game not found', code);
            return;
        }

        console.info('Firebase update received', { status: data.status, screen: state.screen, gameCode: code });

        const oldStatus = state.game ? state.game.status : null;
        state.game = data;

        if (data.status === 'playing') {
            console.info('Game status is playing -> switching to game screen', { gameCode: code });
            state.screen = 'game';
        }

        // When all players have played and turn isn't resolved, resolve
        if (state.game.status === 'playing' && !state.game.turnResolved && oldStatus === 'playing') {
            const allPlayed = state.game.players.every(p => p.playedCard !== null);
            console.log('Checking if all have played', { allPlayed });
            if (allPlayed) await resolveTurn();
        }

        render();
    });
};

const createGame = async () => {
    if (!state.playerName.trim() || !database) {
        alert('Entrez un pseudo !');
        return;
    }

    const code = generateGameCode();
    const pid = Math.random().toString(36).substring(7);

    state.gameCode = code;
    state.playerId = pid;

    const initialGame = {
        code,
        status: 'waiting',
        hostId: pid,
        players: [{
            id: pid,
            name: state.playerName,
            score: 0,
            ready: false,
            hand: [],
            playedCard: null
        }],
        rows: [],
        round: 0,
        chat: [],
        currentTurn: 0,
        maxRounds: 6,
        turnResolved: false,
        waitingForRowChoice: null,
        pendingCard: null
    };

    console.info('Creating game', { code, host: state.playerName, hostId: pid });
    await saveGame(initialGame);

    subscribeToGame(code);
    state.screen = 'lobby';
    render();
};

const joinGame = async () => {
    if (!state.playerName.trim() || !state.joinCode.trim() || !database) {
        alert('Entrez pseudo et code !');
        return;
    }

    const normalized = state.joinCode.toUpperCase();
    console.info('Attempting to join game', { joinCode: normalized, player: state.playerName });
    const snap = await database.ref('games/' + normalized).once('value');
    const game = snap.val();

    if (!game) {
        console.warn('Partie introuvable', normalized);
        alert('Partie introuvable !');
        return;
    }
    if (game.status !== 'waiting') {
        console.warn('Partie déjà commencée', normalized);
        alert('Partie déjà commencée !');
        return;
    }

    const pid = Math.random().toString(36).substring(7);
    const newPlayer = {
        id: pid,
        name: state.playerName,
        score: 0,
        ready: false,
        hand: [],
        playedCard: null
    };
    game.players.push(newPlayer);

    state.gameCode = normalized;
    state.playerId = pid;
    console.info('Joining game success', { gameCode: normalized, playerId: pid, playerName: state.playerName });
    await saveGame(game);
    subscribeToGame(state.gameCode);
    state.screen = 'lobby';
    render();
};

const toggleReady = async () => {
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('toggleReady: player not found', state.playerId); return; }
    p.ready = !p.ready;
    console.log('Toggling ready', { player: p.name, ready: p.ready });
    await saveGame(state.game);
};

const startGame = async () => {
    if (state.game.hostId !== state.playerId || state.game.players.length < 2) {
        console.warn('startGame unauthorized or not enough players', { hostId: state.game.hostId, me: state.playerId, players: state.game.players.length });
        return;
    }
    if (!state.game.players.every(p => p.ready)) {
        alert('Tous doivent être prêts !');
        return;
    }

    try {
        const deck = shuffleDeck();
        console.info('Deck created', { length: deck.length, preview: deck.slice(0, 12) });

        const cardsNeeded = 4 + (state.game.players.length * 10);
        if (deck.length < cardsNeeded) {
            throw new Error(`Pas assez de cartes! Besoin: ${cardsNeeded}, Disponible: ${deck.length}`);
        }

        state.game.rows = [
            [deck[0]],
            [deck[1]],
            [deck[2]],
            [deck[3]]
        ];
        deck.splice(0, 4);

        state.game.players.forEach(p => {
            p.hand = deck.splice(0, 10).sort((a, b) => a - b);
            p.playedCard = null;
            console.log('Dealt hand to player', { player: p.name, hand: p.hand });
        });

        state.game.status = 'playing';
        state.game.round = 1;
        state.game.currentTurn = 1;
        state.game.turnResolved = false;
        state.game.waitingForRowChoice = null;
        state.game.pendingCard = null;

        console.info('Game starting', { gameCode: state.gameCode, round: state.game.round, currentTurn: state.game.currentTurn, rows: state.game.rows });
        await saveGame(state.game);
        state.screen = 'game';
        render();
    } catch (error) {
        console.error('Error starting game:', error);
        alert('Erreur au démarrage : ' + error.message);
    }
};

const playCard = async (card) => {
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('playCard: player not found', state.playerId); return; }
    if (p.playedCard) {
        console.warn('playCard: already played', p.name);
        return;
    }

    p.playedCard = card;
    p.hand = p.hand.filter(c => c !== card);
    console.log('Player played card', { player: p.name, card });
    await saveGame(state.game);
    state.selectedCard = null;
    render();
};

const resolveTurn = async () => {
    console.info('resolveTurn called for game', state.gameCode);
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    if (!game) { console.warn('resolveTurn: game not found'); return; }

    game.turnResolved = true;
    const plays = game.players.map(p => ({ pid: p.id, card: p.playedCard, name: p.name })).filter(x => x.card !== null).sort((a, b) => a.card - b.card);

    console.log('Plays sorted for resolution', plays);

    for (const play of plays) {
        const validRows = game.rows.map((r, i) => ({ i, last: r[r.length-1], diff: play.card - r[r.length-1] })).filter(x => x.diff > 0);
        console.log('Checking validRows for', play, { validRows });
        if (!validRows.length) {
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            console.info('Need player to choose row', { playerId: play.pid, card: play.card });
            return;
        }
    }

    await resolveAllPlays(game);
};

const resolveAllPlays = async (game) => {
    const plays = game.players
        .filter(p => p.playedCard !== null)
        .map(p => ({ pid: p.id, card: p.playedCard, name: p.name }))
        .sort((a, b) => a.card - b.card);

    console.log('resolveAllPlays start', { plays });

    for (const play of plays) {
        const p = game.players.find(x => x.id === play.pid);
        const validRows = game.rows.map((r, i) => ({ i, last: r[r.length-1], diff: play.card - r[r.length-1] })).filter(x => x.diff > 0);
        console.log('Player', p.name, 'validRows:', validRows);

        if (!validRows.length) {
            console.info('Player needs to choose a row:', p.name, play.card);
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            return;
        }

        const chosenRow = validRows.reduce((min, cur) => cur.diff < min.diff ? cur : min);
        console.log('ChosenRow for', p.name, { chosenRowIndex: chosenRow.i, diff: chosenRow.diff });

        if (game.rows[chosenRow.i].length === 5) {
            const penaltyRow = game.rows[chosenRow.i];
            const penaltyPoints = penaltyRow.reduce((s, c) => s + calculateHeads(c), 0);
            p.score += penaltyPoints;
            console.warn('Player', p.name, 'took row', chosenRow.i, 'and got penalty', penaltyPoints);
            game.rows[chosenRow.i] = [play.card];
        } else {
            game.rows[chosenRow.i].push(play.card);
            console.log('Player', p.name, 'placed card on row', chosenRow.i, 'row now length', game.rows[chosenRow.i].length);
        }

        p.playedCard = null;
    }

    console.info('All plays resolved, advancing turn');

    game.currentTurn++;
    if (game.currentTurn > 10) {
        game.round++;
        console.info('End of round reached, incrementing round to', game.round);
        if (game.round > game.maxRounds) {
            game.status = 'finished';
            console.info('Game finished', { gameCode: state.gameCode });
        } else {
            const deck = shuffleDeck();
            game.rows = [
                [deck[0]],
                [deck[1]],
                [deck[2]],
                [deck[3]]
            ];
            deck.splice(0, 4);
            game.players.forEach(p => {
                p.hand = deck.splice(0, 10).sort((a, b) => a - b);
                console.log('New hand dealt to', p.name, p.hand);
            });
            game.currentTurn = 1;
            console.info('New round started', { round: game.round });
        }
    }

    game.turnResolved = false;
    game.waitingForRowChoice = null;
    game.pendingCard = null;
    await saveGame(game);
};

const sendMessage = async () => {
    if (!state.chatMessage.trim()) return;
    const p = state.game.players.find(x => x.id === state.playerId);
    state.game.chat = state.game.chat || [];
    const entry = { player: p.name, msg: state.chatMessage, time: new Date().toLocaleTimeString() };
    state.game.chat.push(entry);
    console.log('Chat message sent', entry);
    state.chatMessage = '';
    await saveGame(state.game);
    render();
};

const copyLink = () => {
    const link = window.location.origin + window.location.pathname + '?join=' + state.gameCode;
    navigator.clipboard.writeText(link);
    state.copied = true;
    console.log('Link copied to clipboard', link);
    render();
    setTimeout(() => { state.copied = false; render(); }, 2000);
};

const leaveGame = () => {
    if (gameRef) gameRef.off();
    console.info('Player leaving game', { playerId: state.playerId, gameCode: state.gameCode });
    state.screen = 'home';
    state.game = null;
    state.gameCode = '';
    render();
};

const chooseRow = async (rowIndex) => {
    console.log('chooseRow called', { rowIndex, myId: state.playerId });
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    console.log('Current waitingForRowChoice:', game ? game.waitingForRowChoice : null, 'My ID:', state.playerId);

    if (!game || game.waitingForRowChoice !== state.playerId) {
        console.warn('Not authorized to choose or no game state available');
        return;
    }

    const p = game.players.find(x => x.id === state.playerId);
    const penaltyRow = game.rows[rowIndex];
    const penaltyPoints = penaltyRow.reduce((s, c) => s + calculateHeads(c), 0);
    p.score += penaltyPoints;
    console.warn('Player picked up row', { player: p.name, rowIndex, penaltyCards: penaltyRow, penaltyPoints });

    game.rows[rowIndex] = [game.pendingCard];
    console.log('Row replaced with pendingCard', { rowIndex, pendingCard: game.pendingCard });

    p.playedCard = null;

    await resolveAllPlays(game);
};

window.chooseRow = chooseRow;

const Card = (num, sel, click, dis, small) => {
    const h = calculateHeads(num);
    const col = getCardColor(num);
    const sz = small ? 'w-12 h-16 text-xs' : 'w-16 h-24 text-sm';
    return `<button ${click ? 'onclick="handleCard(' + num + ')"' : ''} ${dis ? 'disabled' : ''} class="${sz} ${col} text-white rounded-lg shadow-md flex flex-col items-center justify-between p-1 transition ${sel ? 'ring-4 ring-blue-600 scale-105' : ''} ${!dis && !sel ? 'hover:scale-105 cursor-pointer' : ''} ${dis ? 'opacity-50' : ''} font-bold"><span class="text-xl">${num}</span><div>${'🐮'.repeat(h)}</div></button>`;
};

window.handleCard = (c) => {
    const p = state.game.players.find(x => x.id === state.playerId);
    if (!p) { console.warn('handleCard: player not found'); return; }
    if (p.playedCard) return;
    if (state.selectedCard === c) {
        console.log('Card confirmed, playing', { player: p.name, card: c });
        playCard(c);
    } else {
        state.selectedCard = c;
        console.log('Card selected', { player: p.name, selectedCard: c });
        render();
    }
};

// RENDER - comme auparavant
const render = () => {
    const app = document.getElementById('app');

    // HOME
    if (state.screen === 'home') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h1 class="text-5xl font-bold text-center mb-2 text-orange-600">🐮 6 qui prend !</h1>
                    <p class="text-center text-gray-600 mb-8">Jeu de cartes multijoueur en ligne</p>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Votre pseudo</label>
                        <input type="text" value="${state.playerName}" oninput="state.playerName=this.value" 
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none"
                               placeholder="Entrez votre nom">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <button onclick="createGame()" 
                                class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">
                            🎮 Créer une partie
                        </button>
                        <button onclick="state.screen='join'; render()" 
                                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">
                            🔗 Rejoindre une partie
                        </button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg">
                        <h3 class="font-bold mb-2">📖 Règles rapides :</h3>
                        <ul class="text-sm space-y-1 text-gray-700">
                            <li>• Chaque joueur joue 1 carte par tour</li>
                            <li>• Les cartes sont placées dans l'ordre croissant</li>
                            <li>• Si vous êtes le 6ème d'une rangée, vous ramassez les 5 cartes (points négatifs 🐮)</li>
                            <li>• Le joueur avec le moins de points gagne !</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
    }

    // JOIN
    else if (state.screen === 'join') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Rejoindre une partie</h2>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Code de la partie</label>
                        <input type="text" value="${state.joinCode}" oninput="state.joinCode=this.value.toUpperCase()" 
                               class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none uppercase"
                               placeholder="Ex: ABC123">
                    </div>

                    <button onclick="joinGame()" 
                            class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition shadow-lg mb-4">
                        Rejoindre
                    </button>

                    <button onclick="state.screen='home'; render()" 
                            class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-6 rounded-lg transition">
                        Retour
                    </button>
                </div>
            </div>
        `;
    }

    // LOBBY
    else if (state.screen === 'lobby') {
        const isHost = state.game.hostId === state.playerId;
        const canStart = isHost && state.game.players.length >= 2 && state.game.players.every(p => p.ready);

        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-orange-600">Salon d'attente</h2>
                        <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                            Quitter
                        </button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg mb-6 flex justify-between items-center">
                        <div>
                            <span class="text-sm text-gray-600">Code de la partie :</span>
                            <span class="text-2xl font-bold ml-2">${state.gameCode}</span>
                        </div>
                        <button onclick="copyLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                            ${state.copied ? '✓ Copié !' : '📋 Copier le lien'}
                        </button>
                    </div>

                    <div class="mb-6">
                        <h3 class="font-bold mb-3">Joueurs (${state.game.players.length}) :</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${state.game.players.map(p => `
                                <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                                    <div>
                                        <span class="font-semibold">${p.name}</span>
                                        ${p.id === state.game.hostId ? '<span class="text-xs bg-orange-500 text-white px-2 py-1 rounded ml-2">Hôte</span>' : ''}
                                    </div>
                                    <span class="text-2xl">${p.ready ? '✅' : '⏳'}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="toggleReady()" 
                                class="flex-1 ${state.game.players.find(x => x.id === state.playerId).ready ? 'bg-gray-400' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-3 px-6 rounded-lg transition">
                            ${state.game.players.find(x => x.id === state.playerId).ready ? 'Pas prêt' : 'Je suis prêt !'}
                        </button>
                        ${isHost ? `
                            <button onclick="startGame()" ${!canStart ? 'disabled' : ''}
                                    class="flex-1 ${canStart ? 'bg-orange-500 hover:bg-orange-600' : 'bg-gray-300'} text-white font-bold py-3 px-6 rounded-lg transition ${!canStart ? 'cursor-not-allowed' : ''}">
                                🚀 Lancer la partie
                            </button>
                        ` : ''}
                    </div>

                    ${!canStart && isHost ? '<p class="text-center text-red-500 mt-2 text-sm">Tous les joueurs doivent être prêts (min. 2 joueurs)</p>' : ''}
                </div>
            </div>
        `;
    }

    // GAME
    else if (state.screen === 'game') {
        const me = state.game.players.find(x => x.id === state.playerId);
        const waitingPlayers = state.game.players.filter(p => p.playedCard === null).map(p => p.name);

        if (state.game.status === 'finished') {
            const winner = state.game.players.reduce((min, p) => p.score < min.score ? p : min);
            app.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8 text-center">
                        <h1 class="text-5xl font-bold mb-6 text-green-600">🎉 Partie terminée !</h1>
                        <h2 class="text-3xl mb-8">🏆 ${winner.name} gagne avec ${winner.score} points !</h2>

                        <div class="mb-8">
                            <h3 class="font-bold mb-4">Classement final :</h3>
                            ${state.game.players.sort((a, b) => a.score - b.score).map((p, i) => `
                                <div class="bg-gray-100 p-4 rounded-lg mb-2 flex justify-between items-center">
                                    <span class="text-2xl">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : ''}  ${p.name}</span>
                                    <span class="font-bold text-xl">${p.score} 🐮</span>
                                </div>
                            `).join('')}
                        </div>

                        <button onclick="leaveGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-lg">
                            Retour à l'accueil
                        </button>
                    </div>
                </div>
            `;
            return;
        }

        app.innerHTML = `
            <div class="container mx-auto px-4 py-4">
                <div class="max-w-6xl mx-auto">
                    <!-- Header -->
                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4 flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-orange-600">Manche ${state.game.round}/${state.game.maxRounds} - Tour ${state.game.currentTurn}/10</h2>
                            <p class="text-sm text-gray-600">Code: ${state.gameCode}</p>
                        </div>
                        <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                            Quitter
                        </button>
                    </div>

                    <!-- Scores -->
                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4">
                        <div class="grid grid-cols-2 md:grid-cols-${state.game.players.length} gap-2">
                            ${state.game.players.map(p => `
                                <div class="text-center p-2 rounded ${p.id === state.playerId ? 'bg-orange-100' : 'bg-gray-100'}">
                                    <div class="font-semibold">${p.name}</div>
                                    <div class="text-2xl font-bold">${p.score} 🐮</div>
                                    ${p.playedCard ? '<div class="text-green-500 text-sm">✓ Joué</div>' : '<div class="text-gray-400 text-sm">En attente...</div>'}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Rows -->
                    <div class="bg-white rounded-lg shadow-lg p-6 mb-4">
                        <h3 class="font-bold mb-4 text-lg">Rangées de cartes :</h3>
                        ${state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId ? 
                            '<div class="bg-orange-100 border-2 border-orange-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-orange-700">⚠️ Votre carte est trop petite ! Choisissez une rangée à ramasser en cliquant dessus :</p></div>' 
                            : state.game.waitingForRowChoice ? 
                            '<div class="bg-blue-100 border-2 border-blue-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-blue-700">⏳ ' + state.game.players.find(p => p.id === state.game.waitingForRowChoice).name + ' doit choisir une rangée...</p></div>'
                            : ''}
                        <div class="space-y-3">
                            ${state.game.rows.map((row, i) => {
                                const totalHeads = row.reduce((sum, c) => sum + calculateHeads(c), 0);
                                const canClick = state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId;
                                return `
                                <div class="flex items-center gap-2 ${canClick ? 'cursor-pointer hover:bg-orange-50 border-2 border-transparent hover:border-orange-500 rounded-lg p-2 transition' : ''}" ${canClick ? 'onclick="chooseRow(' + i + ')"' : ''}>
                                    <span class="font-bold text-gray-600 min-w-[40px]">R${i + 1}:</span>
                                    <div class="flex gap-1 flex-wrap flex-1">
                                        ${row.map(c => Card(c, false, false, true, true)).join('')}
                                    </div>
                                    <span class="text-sm font-semibold text-gray-700 bg-gray-100 px-3 py-1 rounded">${row.length}/5 | ${totalHeads} 🐮</span>
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <!-- Player hand -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h3 class="font-bold mb-4 text-lg">Votre main :</h3>
                        ${me.playedCard ? `
                            <div class="text-center py-8">
                                <p class="text-xl mb-4">✓ Vous avez joué votre carte !</p>
                                <p class="text-gray-600">En attente des autres joueurs...</p>
                                ${waitingPlayers.length > 0 ? `<p class="text-sm text-gray-500 mt-2">Attente de : ${waitingPlayers.join(', ')}</p>` : ''}
                            </div>
                        ` : `
                            <div class="flex gap-2 flex-wrap justify-center">
                                ${me.hand.map(c => Card(c, state.selectedCard === c, true, false, false)).join('')}
                            </div>
                            ${state.selectedCard ? '<p class="text-center mt-4 text-sm text-gray-600">Cliquez à nouveau pour confirmer</p>' : '<p class="text-center mt-4 text-sm text-gray-600">Choisissez une carte</p>'}
                        `}
                    </div>
                </div>
            </div>
        `;
    }
};

document.addEventListener('DOMContentLoaded', () => {
    const p = new URLSearchParams(window.location.search);
    const j = p.get('join');
    if (j) state.joinCode = j;
    console.info('App loaded', { joinParam: j });
    render();
});
</script>
</body>
</html>
