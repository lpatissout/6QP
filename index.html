<!-- Spectator console logic -->
<script>
(function(){
    window.__spectator = window.__spectator || { logs: [], max:5000, filter:'all' };

    function fmtArgs(args){
        return args.map(a=>{
            try { if (typeof a === 'object') return JSON.stringify(a); return String(a); }
            catch(e){ return '[object]'; }
        }).join(' ');
    }

    function renderLogs(){
        const container = document.getElementById('spectator-console');
        if (!container) return;
        const f = window.__spectator.filter;
        const visible = window.__spectator.logs.filter(l => f === 'all' ? true : l.level === f.toUpperCase());
        container.innerHTML = visible.map(l=>{
            const time = `<span class="log-TIME">[${l.time}]</span>`;
            const level = `<span class="log-${l.level}">${l.level}</span>`;
            const text = `<span class="log-${l.level}" style="margin-left:6px;">${l.text}</span>`;
            return `<div class="log-line">${time} ${level} ${text}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    function pushLog(level, ...args){
        const time = new Date().toLocaleTimeString();
        const text = fmtArgs(args);
        window.__spectator.logs.push({ time, level: level.toUpperCase(), text });
        if (window.__spectator.logs.length > window.__spectator.max) window.__spectator.logs.shift();
        renderLogs();
        if (originalConsole[level]) originalConsole[level].apply(console, args);
    }

    const originalConsole = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console)
    };

    console.log = (...args)=>pushLog('log', ...args);
    console.info = (...args)=>pushLog('info', ...args);
    console.warn = (...args)=>pushLog('warn', ...args);
    console.error = (...args)=>pushLog('error', ...args);

    document.addEventListener('DOMContentLoaded', ()=>{
        const btnAll = document.getElementById('filter-all');
        const btnLog = document.getElementById('filter-log');
        const btnInfo = document.getElementById('filter-info');
        const btnWarn = document.getElementById('filter-warn');
        const btnError = document.getElementById('filter-error');
        const btnClear = document.getElementById('clear-logs');
        const btnDownload = document.getElementById('download-logs');

        function setActive(btn){
            [btnAll,btnLog,btnInfo,btnWarn,btnError].forEach(b=>b && b.classList.remove('active'));
            if (btn) btn.classList.add('active');
        }

        btnAll && btnAll.addEventListener('click', ()=>{ window.__spectator.filter='all'; setActive(btnAll); renderLogs(); });
        btnLog && btnLog.addEventListener('click', ()=>{ window.__spectator.filter='log'; setActive(btnLog); renderLogs(); });
        btnInfo && btnInfo.addEventListener('click', ()=>{ window.__spectator.filter='info'; setActive(btnInfo); renderLogs(); });
        btnWarn && btnWarn.addEventListener('click', ()=>{ window.__spectator.filter='warn'; setActive(btnWarn); renderLogs(); });
        btnError && btnError.addEventListener('click', ()=>{ window.__spectator.filter='error'; setActive(btnError); renderLogs(); });

        btnClear && btnClear.addEventListener('click', ()=>{ window.__spectator.logs=[]; renderLogs(); });
        btnDownload && btnDownload.addEventListener('click', ()=>{
            const text = window.__spectator.logs.map(l=>`[${l.time}] ${l.level} ${l.text}`).join('\n');
            const blob = new Blob([text], { type:'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url;
            a.download = `quiprend-logs-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
            document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        });

        renderLogs();
    });

    window.spectatorPush = function(level, ...args){
        if (!['log','info','warn','error'].includes(level)) level='log';
        pushLog(level, ...args);
    };
})();
</script>

<!-- Game logic -->
<script>
/* ---------- Firebase config ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyC2YfNviAE_jDD0wT7TmfZBeOaKqjJdJuQ",
  authDomain: "quiprend-879a6.firebaseapp.com",
  databaseURL: "https://quiprend-879a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiprend-879a6",
  storageBucket: "quiprend-879a6.firebasestorage.app",
  messagingSenderId: "476103541469",
  appId: "1:476103541469:web:3a0ac76f9bde94b1745134"
};

let database = null;
try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    console.info('Firebase initialized ✅', { projectId: firebaseConfig.projectId });
} catch (e) {
    console.error('Firebase init error', e);
    alert('Erreur Firebase: ' + (e && e.message ? e.message : JSON.stringify(e)));
}

/* detect mobile */
const isMobile = /Mobi|Android|iPhone|iPad|Tablet/i.test(navigator.userAgent) || window.innerWidth < 900;
console.info('Device detection', { isMobile });

/* ---------- app state ---------- */
let state = {
    screen: 'home',
    gameCode: '',
    playerName: '',
    joinCode: '',
    game: null,
    playerId: null,
    selectedCard: null,
    chatMessage: '',
    copied: false,
    debugLogs: [],
    showDebug: false
};

let gameRef = null;

/* tiny debug logger saved in-state (used only desktop) */
function debugLog(msg, payload=null){
    const t = new Date().toLocaleTimeString();
    state.debugLogs.push({ time: t, msg, payload: payload ? JSON.stringify(payload) : null });
    if (state.debugLogs.length > 150) state.debugLogs.shift();
    console.log(`[DEBUG ${t}] ${msg}`, payload || '');
}

/* helpers */
const generateGameCode = () => Math.random().toString(36).substring(2,8).toUpperCase();
const calculateHeads = (card) => {
    if (card === 55) return 7;
    if (card % 11 === 0) return 5;
    if (card % 10 === 0) return 3;
    if (card % 5 === 0) return 2;
    return 1;
};
const getCardColor = (card) => {
    if (card <= 26) return 'bg-blue-400';
    if (card <= 52) return 'bg-green-400';
    if (card <= 78) return 'bg-yellow-400';
    return 'bg-red-400';
};
const shuffleDeck = () => {
    const deck = Array.from({ length: 104 }, (_, i) => i + 1);
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    return deck;
};

/* safe save: normalize undefined -> null for keys we care about */
const saveGame = async (data) => {
    if (!database) { console.warn('saveGame: no DB'); return; }

    if (data.pendingCard === undefined) data.pendingCard = null;
    if (data.waitingForRowChoice === undefined) data.waitingForRowChoice = null;

    // Validate rows do not contain undefined entries
    if (data.rows && Array.isArray(data.rows)) {
        for (let i=0;i<data.rows.length;i++){
            for (let j=0;j<data.rows[i].length;j++){
                if (data.rows[i][j] === undefined) {
                    console.error('ERREUR saveGame: undefined card at', i, j, 'rows:', JSON.stringify(data.rows));
                    throw new Error(`Carte undefined à la position [${i}][${j}]`);
                }
            }
        }
    }

    try {
        console.log('Saving to Firebase', { gameCode: state.gameCode, rowsCount: data.rows ? data.rows.map(r=>r.length) : null });
        await database.ref('games/' + state.gameCode).set(data);
        state.game = data;
        console.info('Save completed for game', state.gameCode);
    } catch (err) {
        // show more detailed error
        console.error('Erreur lors de la sauvegarde Firebase:', err && err.message ? err.message : err);
    }
};

/* subscribe to changes */
const subscribeToGame = (code) => {
    if (!database) { console.warn('subscribeToGame: no DB'); return; }
    if (gameRef) gameRef.off();
    gameRef = database.ref('games/' + code);
    gameRef.on('value', async snap => {
        const data = snap.val();
        if (!data) { console.warn('subscribeToGame: game not found', code); return; }

        debugLog('Firebase update received', { status: data.status, waitingForRowChoice: data.waitingForRowChoice });
        const oldStatus = state.game ? state.game.status : null;
        state.game = data;

        // force screen when playing
        if (data.status === 'playing') {
            debugLog('Game status playing -> screen=game');
            state.screen = 'game';
        }

        // Only attempt to resolve when we moved inside playing and it was already playing before
        // but to be safe, only call resolve when at least one playedCard exists and all players have non-null playedCard
        if (state.game.status === 'playing' && !state.game.turnResolved && oldStatus === 'playing') {
            const anyPlayed = state.game.players.some(p => p.playedCard != null);
            const allPlayed = state.game.players.every(p => p.playedCard != null);
            debugLog('resolve check', { anyPlayed, allPlayed });
            if (anyPlayed && allPlayed) {
                await resolveTurn();
            }
        }

        render();
    });
};

/* create / join */
const createGame = async () => {
    if (!state.playerName.trim() || !database) { alert('Entrez un pseudo !'); return; }
    const code = generateGameCode();
    const pid = Math.random().toString(36).substring(7);
    state.gameCode = code;
    state.playerId = pid;

    const initial = {
        code,
        status: 'waiting',
        hostId: pid,
        players: [{ id: pid, name: state.playerName, score: 0, ready: false, hand: [], playedCard: null }],
        rows: [],
        round: 0,
        chat: [],
        currentTurn: 0,
        maxRounds: 6,
        turnResolved: false,
        waitingForRowChoice: null,
        pendingCard: null
    };

    debugLog('Creating game', { code, host: state.playerName });
    await saveGame(initial);
    subscribeToGame(code);
    state.screen = 'lobby';
    render();
};

const joinGame = async () => {
    if (!state.playerName.trim() || !state.joinCode.trim() || !database) { alert('Entrez pseudo et code !'); return; }
    const normalized = state.joinCode.toUpperCase();
    debugLog('Attempting to join', { joinCode: normalized, player: state.playerName });
    const snap = await database.ref('games/' + normalized).once('value');
    const game = snap.val();
    if (!game) { alert('Partie introuvable !'); return; }
    if (game.status !== 'waiting') { alert('Partie déjà commencée !'); return; }
    const pid = Math.random().toString(36).substring(7);
    game.players.push({ id: pid, name: state.playerName, score: 0, ready: false, hand: [], playedCard: null });
    state.gameCode = normalized;
    state.playerId = pid;
    await saveGame(game);
    subscribeToGame(state.gameCode);
    state.screen = 'lobby';
    render();
};

/* ready/start */
const toggleReady = async () => {
    const p = state.game.players.find(x=>x.id===state.playerId);
    if (!p) { console.warn('toggleReady: player not found'); return; }
    p.ready = !p.ready;
    debugLog('Toggling ready', { player: p.name, ready: p.ready });
    await saveGame(state.game);
};

const startGame = async () => {
    if (state.game.hostId !== state.playerId || state.game.players.length < 2) { console.warn('startGame: unauthorized or not enough players'); return; }
    if (!state.game.players.every(p => p.ready)) { alert('Tous doivent être prêts !'); return; }

    debugLog('Starting game', { players: state.game.players.length });
    try {
        const deck = shuffleDeck();
        const cardsNeeded = 4 + state.game.players.length * 10;
        if (deck.length < cardsNeeded) throw new Error('Pas assez de cartes');

        state.game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
        deck.splice(0,4);
        state.game.players.forEach(p => { p.hand = deck.splice(0,10).sort((a,b)=>a-b); p.playedCard = null; });
        state.game.status = 'playing';
        state.game.round = 1;
        state.game.currentTurn = 1;
        state.game.turnResolved = false;
        state.game.waitingForRowChoice = null;
        state.game.pendingCard = null;

        await saveGame(state.game);
        state.screen = 'game';
        render();
    } catch (err) {
        debugLog('Error starting game', { err: err && err.message ? err.message : err });
        alert('Erreur au démarrage : ' + (err && err.message ? err.message : 'Erreur inconnue'));
    }
};

/* playCard: allow override as long as turn not resolved and no waitingForRowChoice */
const playCard = async (card) => {
    if (!state.game) return;
    const p = state.game.players.find(x=>x.id===state.playerId);
    if (!p) { console.warn('playCard: player not found'); return; }

    // Guard: if turn locked or game not playing -> no change allowed
    if (state.game.waitingForRowChoice != null || state.game.turnResolved || state.game.status !== 'playing') {
        console.warn('playCard: cannot play now: turn locked or not playing');
        return;
    }

    // If player already had a playedCard (changing), return previous card to hand
    if (p.playedCard != null) {
        // add back previous played card to hand
        p.hand.push(p.playedCard);
        p.hand.sort((a,b)=>a-b);
        debugLog('Reverting previous playedCard back to hand', { player: p.name, previous: p.playedCard });
    }

    // remove selected card from hand and set as playedCard (this will be saved)
    p.hand = p.hand.filter(c => c !== card);
    p.playedCard = card;
    debugLog('Player played card', { player: p.name, card });

    await saveGame(state.game);
    state.selectedCard = null;
    render();
};

/* resolveTurn: robust filtering to avoid null/undefined entries */
const resolveTurn = async () => {
    debugLog('resolveTurn called');
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    if (!game) { console.warn('resolveTurn: no game snapshot'); return; }

    // mark in-progress
    game.turnResolved = true;

    // Only consider players who actually played (playedCard != null)
    const plays = game.players
        .filter(p => p.playedCard != null)
        .map(p => ({ pid: p.id, card: p.playedCard }))
        .sort((a,b)=>a.card - b.card);

    debugLog('Plays to resolve', { cards: plays.map(x=>x.card) });

    if (plays.length === 0) {
        // Nothing to do
        debugLog('No plays to resolve (0 cards) — exiting');
        game.turnResolved = false;
        await saveGame(game);
        return;
    }

    // First pass: detect if any card is too small and needs a player choice
    for (const play of plays) {
        const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] })).filter(x=>x.diff > 0);
        debugLog('validRows for play', { play, validRows });
        if (validRows.length === 0) {
            // this play requires picking up a row
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            debugLog('Player must choose row', { playerId: play.pid, card: play.card });
            return;
        }
    }

    // If no forced choices: resolve all plays
    await resolveAllPlays(game);
};

const resolveAllPlays = async (game) => {
    const plays = game.players
        .filter(p => p.playedCard != null)
        .map(p => ({ pid: p.id, card: p.playedCard }))
        .sort((a,b)=>a.card - b.card);

    debugLog('resolveAllPlays', { cards: plays.map(p=>p.card) });

    for (const play of plays) {
        const p = game.players.find(x => x.id === play.pid);
        const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] })).filter(x=>x.diff > 0);

        if (validRows.length === 0) {
            // player must choose a row now
            game.waitingForRowChoice = play.pid;
            game.pendingCard = play.card;
            game.turnResolved = false;
            await saveGame(game);
            debugLog('Player must choose row during resolveAllPlays', { player: p.name, card: play.card });
            return;
        }

        const chosenRow = validRows.reduce((min, cur) => cur.diff < min.diff ? cur : min);
        if (game.rows[chosenRow.i].length === 5) {
            const penalty = game.rows[chosenRow.i].reduce((s,c)=>s+calculateHeads(c),0);
            p.score += penalty;
            debugLog('6th card penalty', { player: p.name, row: chosenRow.i, penalty });
            game.rows[chosenRow.i] = [play.card];
        } else {
            game.rows[chosenRow.i].push(play.card);
            debugLog('Card placed', { player: p.name, card: play.card, row: chosenRow.i });
        }
        p.playedCard = null;
    }

    // Advance turn / rounds
    game.currentTurn++;
    if (game.currentTurn > 10) {
        game.round++;
        if (game.round > game.maxRounds) {
            game.status = 'finished';
            debugLog('Game finished', { gameCode: state.gameCode });
        } else {
            const deck = shuffleDeck();
            game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
            deck.splice(0,4);
            game.players.forEach(p => p.hand = deck.splice(0,10).sort((a,b)=>a-b));
            game.currentTurn = 1;
            debugLog('New round started', { round: game.round });
        }
    }

    game.turnResolved = false;
    game.waitingForRowChoice = null;
    game.pendingCard = null;
    await saveGame(game);
};

const sendMessage = async () => {
    if (!state.chatMessage.trim()) return;
    const p = state.game.players.find(x=>x.id===state.playerId);
    state.game.chat = state.game.chat || [];
    const entry = { player: p.name, msg: state.chatMessage, time: new Date().toLocaleTimeString() };
    state.game.chat.push(entry);
    debugLog('Chat sent', entry);
    state.chatMessage = '';
    await saveGame(state.game);
    render();
};

const copyLink = () => {
    const url = window.location.origin + window.location.pathname + '?join=' + state.gameCode;
    navigator.clipboard.writeText(url);
    state.copied = true;
    debugLog('Link copied', url);
    render();
    setTimeout(()=>{ state.copied=false; render(); }, 2000);
};

const leaveGame = () => {
    if (gameRef) gameRef.off();
    debugLog('Leaving game', { playerId: state.playerId });
    state.screen = 'home';
    state.game = null;
    state.gameCode = '';
    render();
};

/* chooseRow: strict checks to avoid unauthorized picks */
const chooseRow = async (rowIndex) => {
    debugLog('chooseRow called', { rowIndex, myId: state.playerId });
    const snap = await database.ref('games/' + state.gameCode).once('value');
    const game = snap.val();
    if (!game) { console.warn('chooseRow: game not found'); return; }

    // Must have a pendingCard and waitingForRowChoice equal to this player
    if (game.pendingCard == null || game.waitingForRowChoice == null) {
        debugLog('chooseRow: nothing to choose (no pending card)');
        return;
    }
    if (game.waitingForRowChoice !== state.playerId) {
        debugLog('chooseRow: not authorized', { waitingFor: game.waitingForRowChoice, me: state.playerId });
        return;
    }

    const p = game.players.find(x => x.id === state.playerId);
    const penaltyRow = game.rows[rowIndex];
    const penaltyPoints = penaltyRow.reduce((s,c)=>s+calculateHeads(c),0);
    p.score += penaltyPoints;
    debugLog('Picked up row', { player: p.name, rowIndex, penaltyPoints });
    // replace row with pending card
    game.rows[rowIndex] = [game.pendingCard];
    p.playedCard = null;
    // continue resolution
    await resolveAllPlays(game);
};
window.chooseRow = chooseRow;

/* Card markup helper */
const Card = (num, sel, click, dis, small) => {
    const h = calculateHeads(num);
    const col = getCardColor(num);
    const sz = small ? 'w-12 h-16 text-xs' : 'w-16 h-24 text-sm';
    return `<button ${click ? 'onclick="handleCard(' + num + ')"' : ''} ${dis ? 'disabled' : ''} data-card="${num}" class="${sz} ${col} text-white rounded-lg shadow-md flex flex-col items-center justify-between p-1 transition ${sel ? 'card-selected' : ''} ${!dis && !sel ? 'hover:scale-105 cursor-pointer' : ''} ${dis ? 'opacity-50' : ''} font-bold"><span class="text-xl">${num}</span><div>${'🐮'.repeat(h)}</div></button>`;
};

/* handleCard: single tap on mobile = immediate play; desktop = select-confirm */
window.handleCard = (c) => {
    if (!state.game) return;
    const p = state.game.players.find(x=>x.id===state.playerId);
    if (!p) { console.warn('handleCard: player not found'); return; }

    if (isMobile) {
        // immediate play/override while allowed
        playCard(c);
        return;
    }

    // Desktop: two-step
    if (state.selectedCard === c) {
        playCard(c);
    } else {
        state.selectedCard = c;
        debugLog('Card selected (desktop)', { card: c });
        render();
    }
};

/* ---------- render ---------- */
const render = () => {
    const app = document.getElementById('app');
    if (!app) return;

    // HOME
    if (state.screen === 'home') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h1 class="text-5xl font-bold text-center mb-2 text-orange-600">🐮 6 qui prend !</h1>
                    <p class="text-center text-gray-600 mb-8">Jeu de cartes multijoueur en ligne</p>

                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Votre pseudo</label>
                        <input type="text" value="${state.playerName}" oninput="state.playerName=this.value" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none" placeholder="Entrez votre nom">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <button onclick="createGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">🎮 Créer une partie</button>
                        <button onclick="state.screen='join'; render()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-lg transition shadow-lg">🔗 Rejoindre une partie</button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg">
                        <h3 class="font-bold mb-2">📖 Règles rapides :</h3>
                        <ul class="text-sm space-y-1 text-gray-700">
                            <li>• Chaque joueur joue 1 carte par tour</li>
                            <li>• Les cartes sont placées dans l'ordre croissant</li>
                            <li>• Si vous êtes le 6ème d'une rangée, vous ramassez les 5 cartes (points négatifs 🐮)</li>
                            <li>• Le joueur avec le moins de points gagne !</li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
        return;
    }

    // JOIN
    if (state.screen === 'join') {
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Rejoindre une partie</h2>
                    <div class="mb-6">
                        <label class="block text-sm font-semibold mb-2">Code de la partie</label>
                        <input type="text" value="${state.joinCode}" oninput="state.joinCode=this.value.toUpperCase()" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none uppercase" placeholder="Ex: ABC123">
                    </div>
                    <button onclick="joinGame()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-lg transition shadow-lg mb-4">Rejoindre</button>
                    <button onclick="state.screen='home'; render()" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-6 rounded-lg transition">Retour</button>
                </div>
            </div>
        `;
        return;
    }

    // LOBBY
    if (state.screen === 'lobby') {
        const isHost = state.game && state.game.hostId === state.playerId;
        const me = state.game.players.find(x=>x.id===state.playerId);
        const canStart = isHost && state.game.players.length >= 2 && state.game.players.every(p=>p.ready);
        app.innerHTML = `
            <div class="container mx-auto px-4 py-8">
                <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-orange-600">Salon d'attente</h2>
                        <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">Quitter</button>
                    </div>

                    <div class="bg-amber-50 p-4 rounded-lg mb-6 flex justify-between items-center">
                        <div><span class="text-sm text-gray-600">Code de la partie :</span> <span class="text-2xl font-bold ml-2">${state.gameCode}</span></div>
                        <button onclick="copyLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">${state.copied ? '✓ Copié !' : '📋 Copier le lien'}</button>
                    </div>

                    <div class="mb-6">
                        <h3 class="font-bold mb-3">Joueurs (${state.game.players.length}) :</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${state.game.players.map(p=>`
                                <div class="bg-gray-100 p-4 rounded-lg flex justify-between items-center">
                                    <div>
                                        <span class="font-semibold">${p.name}</span>
                                        ${p.id===state.game.hostId ? '<span class="text-xs bg-orange-500 text-white px-2 py-1 rounded ml-2">Hôte</span>' : ''}
                                    </div>
                                    <span class="text-2xl">${p.ready ? '✅' : '⏳'}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="toggleReady()" class="flex-1 ${me && me.ready ? 'bg-gray-400' : 'bg-green-500 hover:bg-green-600'} text-white font-bold py-3 px-6 rounded-lg transition">${me && me.ready ? 'Pas prêt' : 'Je suis prêt !'}</button>
                        ${isHost ? `<button onclick="startGame()" ${!canStart ? 'disabled' : ''} class="flex-1 ${canStart ? 'bg-orange-500 hover:bg-orange-600' : 'bg-gray-300'} text-white font-bold py-3 px-6 rounded-lg transition ${!canStart ? 'cursor-not-allowed' : ''}">🚀 Lancer la partie</button>` : ''}
                    </div>
                    ${!canStart && isHost ? '<p class="text-center text-red-500 mt-2 text-sm">Tous les joueurs doivent être prêts (min. 2 joueurs)</p>' : ''}
                </div>
            </div>
        `;
        return;
    }

    // GAME
    if (state.screen === 'game') {
        const me = state.game.players.find(x=>x.id===state.playerId);
        const waitingPlayers = state.game.players.filter(p => p.playedCard == null).map(p=>p.name);
        const debugVisible = !isMobile && state.showDebug;

        if (state.game.status === 'finished') {
            const winner = state.game.players.reduce((min,p)=>p.score<min.score? p:min);
            app.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8 text-center">
                        <h1 class="text-5xl font-bold mb-6 text-green-600">🎉 Partie terminée !</h1>
                        <h2 class="text-3xl mb-8">🏆 ${winner.name} gagne avec ${winner.score} points !</h2>
                        <div class="mb-8">
                            <h3 class="font-bold mb-4">Classement final :</h3>
                            ${state.game.players.sort((a,b)=>a.score-b.score).map((p,i)=>`<div class="bg-gray-100 p-4 rounded-lg mb-2 flex justify-between items-center"><span class="text-2xl">${i===0?'🥇':i===1?'🥈':i===2?'🥉':''} ${p.name}</span><span class="font-bold text-xl">${p.score} 🐮</span></div>`).join('')}
                        </div>
                        <button onclick="leaveGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-lg">Retour à l'accueil</button>
                    </div>
                </div>
            `;
            return;
        }

        app.innerHTML = `
            <div class="container mx-auto px-4 py-4">
                <div class="max-w-6xl mx-auto">
                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4 flex justify-between items-center">
                        <div><h2 class="text-2xl font-bold text-orange-600">Manche ${state.game.round}/${state.game.maxRounds} - Tour ${state.game.currentTurn}/10</h2><p class="text-sm text-gray-600">Code: ${state.gameCode}</p></div>
                        <div class="flex gap-2">
                            ${!isMobile ? `<button onclick="state.showDebug = !state.showDebug; render()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg">${state.showDebug ? '📊 Masquer Debug' : '🔍 Debug'}</button>` : ''}
                            <button onclick="leaveGame()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">Quitter</button>
                        </div>
                    </div>

                    ${debugVisible ? `<div class="bg-gray-900 text-green-400 rounded-lg shadow-lg p-4 mb-4 font-mono text-xs max-h-96 overflow-y-auto"><div class="flex justify-between items-center mb-2"><h3 class="text-white font-bold">📊 Console de Debug</h3><button onclick="state.debugLogs=[]; render()" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Effacer</button></div>${state.debugLogs.length===0 ? '<p class="text-gray-500">Aucun log...</p>' : state.debugLogs.map(l=>`<div class="border-b border-gray-700 pb-1"><span class="text-gray-500">[${l.time}]</span> <span class="text-yellow-400">${l.msg}</span>${l.payload?`<div class="pl-4 text-blue-400">${l.payload}</div>`:''}</div>`).join('')}</div>` : ''}

                    <div class="bg-white rounded-lg shadow-lg p-4 mb-4">
                        <div class="grid grid-cols-2 md:grid-cols-${state.game.players.length} gap-2">
                            ${state.game.players.map(p=>`<div class="text-center p-2 rounded ${p.id===state.playerId?'bg-orange-100':'bg-gray-100'}"><div class="font-semibold">${p.name}</div><div class="text-2xl font-bold">${p.score} 🐮</div>${p.playedCard != null ? '<div class="text-green-500 text-sm">✓ Joué</div>' : '<div class="text-gray-400 text-sm">En attente...</div>'}</div>`).join('')}
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-lg p-6 mb-4">
                        <h3 class="font-bold mb-4 text-lg">Rangées de cartes :</h3>
                        ${ (state.game.waitingForRowChoice != null && state.game.pendingCard != null && state.game.waitingForRowChoice === state.playerId) ?
                            '<div class="bg-orange-100 border-2 border-orange-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-orange-700">⚠️ Votre carte est trop petite ! Choisissez une rangée à ramasser en cliquant dessus :</p></div>'
                          : (state.game.waitingForRowChoice != null && state.game.pendingCard != null) ?
                            '<div class="bg-blue-100 border-2 border-blue-500 rounded-lg p-4 mb-4"><p class="text-center font-bold text-blue-700">⏳ ' + (state.game.players.find(p=>p.id===state.game.waitingForRowChoice)?.name || 'Joueur') + ' doit choisir une rangée...</p></div>'
                          : '' }

                        <div class="space-y-3">
                            ${state.game.rows.map((row,i)=>{
                                const totalHeads = row.reduce((s,c)=>s+calculateHeads(c),0);
                                const canClick = (state.game.waitingForRowChoice != null && state.game.waitingForRowChoice === state.playerId && state.game.pendingCard != null);
                                return `<div class="flex items-center gap-2 ${canClick ? 'cursor-pointer hover:bg-orange-50 border-2 border-transparent hover:border-orange-500 rounded-lg p-2 transition' : ''}" ${canClick ? 'onclick="chooseRow(' + i + ')"' : ''}><span class="font-bold text-gray-600 min-w-[40px]">R${i+1}:</span><div class="flex gap-1 flex-wrap flex-1">${row.map(c=>Card(c,false,false,true,true)).join('')}</div><span class="text-sm font-semibold text-gray-700 bg-gray-100 px-3 py-1 rounded">${row.length}/5 | ${totalHeads} 🐮</span></div>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h3 class="font-bold mb-4 text-lg">Votre main :</h3>
                        ${ me && me.playedCard != null ? `
                            <div class="text-center py-8">
                                <p class="text-xl mb-4">✓ Vous avez joué votre carte : ${me.playedCard}</p>
                                <p class="text-gray-600">En attente des autres joueurs...${waitingPlayers.length>0?`<br><span class="text-sm text-gray-500">Attente de: ${waitingPlayers.join(', ')}</span>`:''}</p>
                                ${!isMobile ? '<p class="text-sm text-gray-500 mt-2">Sur desktop, cliquer sur une carte pour la changer avant résolution.</p>' : '<p class="text-sm text-gray-500 mt-2">Tapez une autre carte pour la changer tant que la manche n\'est pas résolue.</p>'}
                            </div>
                          ` : `
                            <div class="flex gap-2 flex-wrap justify-center">
                                ${ me ? me.hand.map(c => Card(c, state.selectedCard === c || me.playedCard === c, true, false, false)).join('') : '' }
                            </div>
                            <p class="text-center mt-4 text-sm text-gray-600">${isMobile ? "Tapez une carte pour la jouer (vous pouvez encore la changer tant que les autres n'ont pas fini)." : "Cliquez une première fois pour sélectionner puis une deuxième fois pour confirmer (ou cliquer une autre carte pour changer)."} </p>
                          `}
                    </div>
                </div>
            </div>
        `;
        return;
    }
};

/* init */
document.addEventListener('DOMContentLoaded', ()=>{
    const p = new URLSearchParams(window.location.search);
    const j = p.get('join');
    if (j) state.joinCode = j;
    console.info('App loaded', { joinParam: j, isMobile });
    render();
});
</script>
</body>
</html>
