<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>6 qui prend !</title>

<!-- Tailwind (UI quick styling) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { corePlugins: { preflight: true } };</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap');
  :root{--bg:#fff7ed;--accent:#f97316}
  body { font-family: "Open Sans", sans-serif; margin:0; background:linear-gradient(135deg,#fffbeb,#ffedd5); min-height:100vh; }
  /* layout */
  #page-wrap { margin-right: 28%; min-height:100vh; box-sizing:border-box; padding:1rem; }
  #spectator-panel {
    position: fixed; right: 0; top: 0; width: 28%; height: 100vh;
    background: #0b0b0b; color: #b7f0a7; border-left: 1px solid rgba(255,255,255,0.06);
    z-index: 80; display:flex; flex-direction:column;
  }
  #spectator-header { display:flex; align-items:center; justify-content:space-between; padding:10px; gap:8px; border-bottom:1px solid rgba(255,255,255,0.03); }
  #spectator-console { padding:10px; overflow-y:auto; font-family: ui-monospace, Menlo, Monaco, "Courier New", monospace; font-size:12px; line-height:1.2; }
  .log-line { margin-bottom:6px; white-space:pre-wrap; word-break:break-word; }
  .log-TIME{ color:#8f9bb3; font-size:11px; margin-right:6px; }
  .log-LOG { color: #cfe7ff; } .log-INFO { color:#b7f0a7;} .log-WARN{ color:#ffd580;} .log-ERROR{ color:#ff7a7a;}
  .spec-btn { background: rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); padding:6px 8px; border-radius:6px; color:inherit; cursor:pointer; font-size:12px; }
  .spec-btn.active{ background: rgba(255,255,255,0.04); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.4); }

  /* collapse spectator */
  #spectator-collapsed { display:none; position:fixed; right:0; top:50%; transform:translateY(-50%); background:#111; color:#fff; padding:6px 8px; border-radius:6px 0 0 6px; cursor:pointer; z-index:90; }
  /* debug toggle style inside app */
  .debug-btn { background:#7c3aed; color:white; }

  /* responsive */
  @media (max-width: 1024px) {
    #page-wrap { margin-right: 0; }
    #spectator-panel { width:100%; height:32vh; top:auto; bottom:0; left:0; right:0; }
    #spectator-collapsed { display:none; }
  }
</style>
</head>
<body>

<!-- PAGE CONTENT WRAP (reserve space for spectator) -->
<div id="page-wrap">
  <div id="app"></div>
</div>

<!-- SPECTATOR PANEL -->
<div id="spectator-panel" role="region" aria-label="Console spectateur">
  <div id="spectator-header">
    <div style="display:flex;gap:8px;align-items:center;">
      <strong style="color:#fff;">6 qui prend — Spectateur</strong>
      <span style="font-size:12px;color:#9fb0c8;">(logs globaux)</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button id="filter-all" class="spec-btn active">All</button>
      <button id="filter-log" class="spec-btn">Log</button>
      <button id="filter-info" class="spec-btn">Info</button>
      <button id="filter-warn" class="spec-btn">Warn</button>
      <button id="filter-error" class="spec-btn">Error</button>
      <button id="clear-logs" class="spec-btn" title="Clear logs">Clear</button>
      <button id="download-logs" class="spec-btn" title="Télécharger les logs">Download</button>
      <button id="collapse-spec" class="spec-btn" title="Masquer console">Collapse</button>
    </div>
  </div>
  <div id="spectator-console" aria-live="polite" tabindex="0"></div>
</div>
<button id="spectator-collapsed" title="Afficher console">Logs ▶</button>

<script>
/* ---------------- SPECTATOR CONSOLE (captures console.*) ---------------- */
(function(){
  window.__spectator = window.__spectator || { logs: [], max: 5000, filter: 'all' };

  function fmtArgs(args) {
    return args.map(a => {
      try {
        if (typeof a === 'object') return JSON.stringify(a);
        return String(a);
      } catch (e) { return '[object]'; }
    }).join(' ');
  }

  function renderLogs() {
    const container = document.getElementById('spectator-console');
    if (!container) return;
    const f = window.__spectator.filter;
    const visible = window.__spectator.logs.filter(l => f === 'all' ? true : l.level === f.toUpperCase());
    container.innerHTML = visible.map(l => {
      const time = `<span class="log-TIME">[${l.time}]</span>`;
      const level = `<span class="log-${l.level}">${l.level}</span>`;
      const text = `<span class="log-${l.level}" style="margin-left:6px;">${l.text}</span>`;
      return `<div class="log-line">${time} ${level} ${text}</div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  function pushLog(level, ...args) {
    const time = new Date().toLocaleTimeString();
    const text = fmtArgs(args);
    window.__spectator.logs.push({ time, level: level.toUpperCase(), text });
    if (window.__spectator.logs.length > window.__spectator.max) window.__spectator.logs.shift();
    renderLogs();
    // forward to original devtools console
    if (originalConsole[level]) originalConsole[level].apply(console, args);
  }

  const originalConsole = {
    log: console.log.bind(console),
    info: console.info.bind(console),
    warn: console.warn.bind(console),
    error: console.error.bind(console)
  };

  console.log = function(...args){ pushLog('log', ...args); };
  console.info = function(...args){ pushLog('info', ...args); };
  console.warn = function(...args){ pushLog('warn', ...args); };
  console.error = function(...args){ pushLog('error', ...args); };

  document.addEventListener('DOMContentLoaded', () => {
    const btnAll = document.getElementById('filter-all');
    const btnLog = document.getElementById('filter-log');
    const btnInfo = document.getElementById('filter-info');
    const btnWarn = document.getElementById('filter-warn');
    const btnError = document.getElementById('filter-error');
    const btnClear = document.getElementById('clear-logs');
    const btnDownload = document.getElementById('download-logs');
    const btnCollapse = document.getElementById('collapse-spec');
    const collapsedBtn = document.getElementById('spectator-collapsed');

    function setActive(button) {
      [btnAll, btnLog, btnInfo, btnWarn, btnError].forEach(b => b.classList.remove('active'));
      if (button) button.classList.add('active');
    }

    btnAll.addEventListener('click', () => { window.__spectator.filter = 'all'; setActive(btnAll); renderLogs(); });
    btnLog.addEventListener('click', () => { window.__spectator.filter = 'log'; setActive(btnLog); renderLogs(); });
    btnInfo.addEventListener('click', () => { window.__spectator.filter = 'info'; setActive(btnInfo); renderLogs(); });
    btnWarn.addEventListener('click', () => { window.__spectator.filter = 'warn'; setActive(btnWarn); renderLogs(); });
    btnError.addEventListener('click', () => { window.__spectator.filter = 'error'; setActive(btnError); renderLogs(); });

    btnClear.addEventListener('click', () => { window.__spectator.logs = []; renderLogs(); });

    btnDownload.addEventListener('click', () => {
      const text = window.__spectator.logs.map(l => `[${l.time}] ${l.level} ${l.text}`).join('\n');
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `quiprend-logs-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    btnCollapse.addEventListener('click', () => {
      document.getElementById('spectator-panel').style.display = 'none';
      collapsedBtn.style.display = 'block';
    });
    collapsedBtn.addEventListener('click', () => {
      document.getElementById('spectator-panel').style.display = 'flex';
      collapsedBtn.style.display = 'none';
    });

    renderLogs();
  });

  // helper to push structured logs from app
  window.spectatorPush = function(level, ...args) {
    if (!['log','info','warn','error'].includes(level)) level = 'log';
    pushLog(level, ...args);
  };
})(); // end spectator
/* ---------------- END SPECTATOR ---------------- */
</script>

<script>
/* ------------------ Jeu + Firebase ------------------ */
/* Version complète avec corrections :
   - use Number.isInteger to detect "played" cards
   - robust logging and debug panel toggling
*/

const firebaseConfig = {
  apiKey: "AIzaSyC2YfNviAE_jDD0wT7TmfZBeOaKqjJdJuQ",
  authDomain: "quiprend-879a6.firebaseapp.com",
  databaseURL: "https://quiprend-879a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiprend-879a6",
  storageBucket: "quiprend-879a6.firebasestorage.app",
  messagingSenderId: "476103541469",
  appId: "1:476103541469:web:3a0ac76f9bde94b1745134"
};

let database = null;
try {
  firebase.initializeApp(firebaseConfig);
  database = firebase.database();
  console.info('Firebase initialized ✅', { projectId: firebaseConfig.projectId });
} catch (e) {
  console.error('Firebase init error', e);
  alert('Erreur Firebase: ' + e.message);
}

let state = {
  screen: 'home',
  gameCode: '',
  playerName: '',
  joinCode: '',
  game: null,
  playerId: null,
  selectedCard: null,
  chatMessage: '',
  showChat: false,
  copied: false,
  debugLogs: [],
  showDebug: false
};

let gameRef = null;

/* helpers */
const generateGameCode = () => Math.random().toString(36).substring(2,8).toUpperCase();
const calculateHeads = (card) => {
  if (card === 55) return 7;
  if (card % 11 === 0) return 5;
  if (card % 10 === 0) return 3;
  if (card % 5 === 0) return 2;
  return 1;
};
const getCardColor = (card) => {
  if (card <= 26) return 'bg-blue-400';
  if (card <= 52) return 'bg-green-400';
  if (card <= 78) return 'bg-yellow-400';
  return 'bg-red-400';
};
const shuffleDeck = () => {
  const deck = Array.from({ length: 104 }, (_, i) => i + 1);
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
};

const debugLog = (msg, data=null) => {
  const time = new Date().toLocaleTimeString();
  state.debugLogs.push({ time, message: msg, data: data ? JSON.stringify(data) : null });
  // keep last 100
  if (state.debugLogs.length > 100) state.debugLogs.shift();
  console.log(`[DBG ${time}] ${msg}`, data || '');
  // also push to spectator in structured form
  spectatorPush('info', msg, data || '');
};

const hasPlayed = (p) => Number.isInteger(p && p.playedCard) && p.playedCard > 0;

/* SAVE */
const saveGame = async (data) => {
  if (!database) {
    console.warn('saveGame aborted: no database');
    return;
  }

  // ensure presence of keys
  if (data.pendingCard === undefined) data.pendingCard = null;
  if (data.waitingForRowChoice === undefined) data.waitingForRowChoice = null;

  // sanity check rows
  if (data.rows && data.rows.length) {
    for (let i=0;i<data.rows.length;i++) {
      for (let j=0;j<data.rows[i].length;j++) {
        if (data.rows[i][j] === undefined) {
          debugLog('❌ ERREUR: undefined card in rows', { row:i, col:j, rows: data.rows });
          throw new Error(`Carte undefined à la position [${i}][${j}]`);
        }
      }
    }
  }

  console.log('Saving to Firebase', { gameCode: state.gameCode, rowsCount: data.rows ? data.rows.map(r=>r.length) : null });
  await database.ref('games/' + state.gameCode).set(data);
  state.game = data;
  console.info('Save completed for', state.gameCode);
};

/* SUBSCRIBE */
const subscribeToGame = (code) => {
  if (!database) return;
  if (gameRef) gameRef.off();
  gameRef = database.ref('games/' + code);
  gameRef.on('value', async (snap) => {
    const data = snap.val();
    if (!data) {
      console.warn('subscribeToGame: no game data', code);
      return;
    }
    debugLog('📥 Firebase update received', { status: data.status, waitingForRowChoice: data.waitingForRowChoice, players: data.players ? data.players.length : 0 });
    const oldStatus = state.game ? state.game.status : null;
    state.game = data;

    if (data.status === 'playing') {
      state.screen = 'game';
      debugLog('Switching to game screen', { gameCode: code });
    }

    // If we previously were already playing (oldStatus === 'playing'), and now another update shows everyone played => resolve
    if (state.game.status === 'playing' && !state.game.turnResolved && oldStatus === 'playing') {
      const allPlayed = state.game.players.every(p => hasPlayed(p));
      console.log('Checking allPlayed for resolveTurn', { allPlayed });
      if (allPlayed) {
        debugLog('All players played -> resolveTurn');
        await resolveTurn();
      }
    }

    render();
  });
};

/* CREATE / JOIN */
const createGame = async () => {
  if (!state.playerName || !state.playerName.trim()) { alert('Entrez un pseudo !'); return; }
  if (!database) { alert('DB not initialized'); return; }

  const code = generateGameCode();
  const pid = Math.random().toString(36).substring(7);
  state.gameCode = code;
  state.playerId = pid;

  const initial = {
    code,
    status: 'waiting',
    hostId: pid,
    players: [{
      id: pid, name: state.playerName, score:0, ready:false, hand:[], playedCard: null
    }],
    rows: [],
    round: 0,
    chat: [],
    currentTurn: 0,
    maxRounds: 6,
    turnResolved: false,
    waitingForRowChoice: null,
    pendingCard: null
  };

  debugLog('Creating game', { code, host: state.playerName, hostId: pid });
  await saveGame(initial);
  subscribeToGame(code);
  state.screen = 'lobby';
  render();
};

const joinGame = async () => {
  if (!state.playerName || !state.playerName.trim() || !state.joinCode || !state.joinCode.trim()) { alert('Entrez pseudo et code !'); return; }
  if (!database) { alert('DB not initialized'); return; }

  const normalized = state.joinCode.toUpperCase();
  debugLog('Attempting to join', { joinCode: normalized, player: state.playerName });
  const snap = await database.ref('games/' + normalized).once('value');
  const game = snap.val();
  if (!game) { alert('Partie introuvable !'); return; }
  if (game.status !== 'waiting') { alert('Partie déjà commencée !'); return; }

  const pid = Math.random().toString(36).substring(7);
  const newPlayer = { id: pid, name: state.playerName, score:0, ready:false, hand:[], playedCard: null };
  game.players.push(newPlayer);
  state.gameCode = normalized;
  state.playerId = pid;
  debugLog('Joining game success', { gameCode: normalized, playerId: pid });
  await saveGame(game);
  subscribeToGame(state.gameCode);
  state.screen = 'lobby';
  render();
};

/* READY / START */
const toggleReady = async () => {
  const p = state.game.players.find(x => x.id === state.playerId);
  if (!p) { console.warn('toggleReady: no player'); return; }
  p.ready = !p.ready;
  debugLog('Toggling ready', { player: p.name, ready: p.ready });
  await saveGame(state.game);
};

const startGame = async () => {
  if (state.game.hostId !== state.playerId || state.game.players.length < 2) { console.warn('startGame: unauthorized or not enough players'); return; }
  if (!state.game.players.every(p => p.ready)) { alert('Tous doivent être prêts !'); return; }

  debugLog('Starting game', { players: state.game.players.length });
  try {
    const deck = shuffleDeck();
    const cardsNeeded = 4 + (state.game.players.length * 10);
    if (deck.length < cardsNeeded) throw new Error('Pas assez de cartes');

    state.game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
    deck.splice(0,4);
    state.game.players.forEach(p => { p.hand = deck.splice(0,10).sort((a,b)=>a-b); p.playedCard = null; debugLog('Dealt hand', { player: p.name, hand: p.hand }); });
    state.game.status = 'playing';
    state.game.round = 1;
    state.game.currentTurn = 1;
    state.game.turnResolved = false;
    state.game.waitingForRowChoice = null;
    state.game.pendingCard = null;

    debugLog('Game initialized', { rows: state.game.rows.map(r => r[0]) });
    await saveGame(state.game);
    state.screen = 'game';
    render();
  } catch (err) {
    debugLog('Error starting', { error: err.message });
    alert('Erreur au démarrage : ' + err.message);
  }
};

/* PLAY CARD */
const playCard = async (card) => {
  const p = state.game.players.find(x => x.id === state.playerId);
  if (!p) { console.warn('playCard: player not found'); return; }
  if (hasPlayed(p)) { console.warn('playCard: already played'); return; }

  p.playedCard = card;
  p.hand = p.hand.filter(c => c !== card);
  debugLog('Player played card', { player: p.name, card });
  await saveGame(state.game);
  state.selectedCard = null;
  render();
};

/* RESOLVE TURN */
const resolveTurn = async () => {
  debugLog('resolveTurn called');
  const snap = await database.ref('games/' + state.gameCode).once('value');
  const game = snap.val();
  if (!game) { console.warn('resolveTurn: no game'); return; }

  game.turnResolved = true;

  // build plays only for players who actually played
  const plays = game.players.map(p => ({ pid: p.id, card: p.playedCard, name: p.name }))
                   .filter(x => Number.isInteger(x.card))
                   .sort((a,b)=>a.card - b.card);

  debugLog('Plays to resolve', { plays: plays.map(p => ({ pid: p.pid, card: p.card })) });

  for (const play of plays) {
    const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] }))
                      .filter(x => x.diff > 0);

    debugLog('Checking validRows', { play, validRows });

    if (!validRows.length) {
      // need player to choose
      game.waitingForRowChoice = play.pid;
      game.pendingCard = play.card;
      game.turnResolved = false;
      await saveGame(game);
      debugLog('Need player to choose row', { playerId: play.pid, card: play.card });
      return;
    }
  }

  // no choice needed
  debugLog('No choice required - resolving all plays');
  await resolveAllPlays(game);
};

/* RESOLVE ALL PLAYS */
const resolveAllPlays = async (game) => {
  const plays = game.players
    .filter(p => Number.isInteger(p.playedCard))
    .map(p => ({ pid: p.id, card: p.playedCard, name: p.name }))
    .sort((a,b)=>a.card - b.card);

  debugLog('resolveAllPlays start', { cards: plays.map(p=>p.card) });

  for (const play of plays) {
    const p = game.players.find(x => x.id === play.pid);
    const validRows = game.rows.map((r,i)=>({ i, last: r[r.length-1], diff: play.card - r[r.length-1] }))
                      .filter(x => x.diff > 0);

    if (!validRows.length) {
      game.waitingForRowChoice = play.pid;
      game.pendingCard = play.card;
      game.turnResolved = false;
      debugLog('Player must choose row during resolveAllPlays', { player: p.name, card: play.card });
      await saveGame(game);
      return;
    }

    const chosenRow = validRows.reduce((min,cur)=> cur.diff < min.diff ? cur : min);
    if (game.rows[chosenRow.i].length === 5) {
      const penaltyRow = game.rows[chosenRow.i];
      const penaltyPoints = penaltyRow.reduce((s,c)=> s + calculateHeads(c), 0);
      p.score += penaltyPoints;
      debugLog('6th card rule: penalty', { player: p.name, row: chosenRow.i, penaltyPoints });
      game.rows[chosenRow.i] = [play.card];
    } else {
      game.rows[chosenRow.i].push(play.card);
      debugLog('Card placed', { player: p.name, card: play.card, row: chosenRow.i });
    }

    p.playedCard = null;
  }

  debugLog('All plays resolved - advancing turn');
  game.currentTurn++;
  if (game.currentTurn > 10) {
    game.round++;
    if (game.round > game.maxRounds) {
      game.status = 'finished';
      debugLog('Game finished', {});
    } else {
      const deck = shuffleDeck();
      game.rows = [[deck[0]],[deck[1]],[deck[2]],[deck[3]]];
      deck.splice(0,4);
      game.players.forEach(p => { p.hand = deck.splice(0,10).sort((a,b)=>a-b); debugLog('New hand', { player: p.name, hand: p.hand }); });
      game.currentTurn = 1;
      debugLog('New round started', { round: game.round });
    }
  }

  game.turnResolved = false;
  game.waitingForRowChoice = null;
  game.pendingCard = null;
  await saveGame(game);
};

/* CHOOSE ROW */
const chooseRow = async (rowIndex) => {
  debugLog('chooseRow called', { rowIndex, playerId: state.playerId });
  const snap = await database.ref('games/' + state.gameCode).once('value');
  const game = snap.val();
  if (!game) { debugLog('chooseRow: game not found'); return; }

  debugLog('Authorization check', { waitingForRowChoice: game.waitingForRowChoice, myId: state.playerId });

  if (game.waitingForRowChoice !== state.playerId) {
    debugLog('Not authorized to choose row', { allowed: game.waitingForRowChoice });
    return;
  }

  const p = game.players.find(x => x.id === state.playerId);
  const penaltyRow = game.rows[rowIndex];
  const penaltyPoints = penaltyRow.reduce((s,c)=> s + calculateHeads(c), 0);
  p.score += penaltyPoints;

  debugLog('Player picked up row', { player: p.name, rowIndex, penaltyCards: penaltyRow, penaltyPoints });

  game.rows[rowIndex] = [game.pendingCard];
  p.playedCard = null;

  await resolveAllPlays(game);
};

window.chooseRow = chooseRow;

/* Card rendering helper */
const Card = (num, sel, click, dis, small) => {
  const h = calculateHeads(num);
  const col = getCardColor(num);
  const sz = small ? 'w-12 h-16 text-xs' : 'w-16 h-24 text-sm';
  return `<button ${click ? 'onclick="handleCard(' + num + ')"' : ''} ${dis ? 'disabled' : ''} class="${sz} ${col} text-white rounded-lg shadow-md flex flex-col items-center justify-between p-1 transition ${sel ? 'ring-4 ring-blue-600 scale-105' : ''} ${!dis && !sel ? 'hover:scale-105 cursor-pointer' : ''} ${dis ? 'opacity-50' : ''} font-bold"><span class="text-xl">${num}</span><div>${'🐮'.repeat(h)}</div></button>`;
};

window.handleCard = (c) => {
  const p = state.game.players.find(x => x.id === state.playerId);
  if (!p) { console.warn('handleCard: player not found'); return; }
  if (hasPlayed(p)) return;
  if (state.selectedCard === c) playCard(c);
  else { state.selectedCard = c; debugLog('Card selected', { player: p.name, selectedCard: c }); render(); }
};

/* SEND MESSAGE */
const sendMessage = async () => {
  if (!state.chatMessage.trim()) return;
  const p = state.game.players.find(x => x.id === state.playerId);
  state.game.chat = state.game.chat || [];
  state.game.chat.push({ player: p.name, msg: state.chatMessage, time: new Date().toLocaleTimeString() });
  debugLog('Chat sent', { player: p.name, msg: state.chatMessage });
  state.chatMessage = '';
  await saveGame(state.game);
  render();
};

/* COPY LINK */
const copyLink = () => {
  const link = window.location.origin + window.location.pathname + '?join=' + state.gameCode;
  navigator.clipboard.writeText(link);
  state.copied = true;
  debugLog('Link copied', { link });
  render();
  setTimeout(()=>{ state.copied = false; render(); }, 2000);
};

/* LEAVE */
const leaveGame = () => {
  if (gameRef) gameRef.off();
  debugLog('Leaving game', { gameCode: state.gameCode, playerId: state.playerId });
  state.screen = 'home';
  state.game = null;
  state.gameCode = '';
  render();
};

/* RENDER */
const render = () => {
  const app = document.getElementById('app');

  // HOME
  if (state.screen === 'home') {
    app.innerHTML = `
      <div class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8">
          <h1 class="text-4xl font-bold text-center mb-2" style="color:var(--accent)">🐮 6 qui prend !</h1>
          <p class="text-center text-gray-600 mb-6">Jeu de cartes multijoueur en ligne</p>

          <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Votre pseudo</label>
            <input type="text" value="${escapeHtml(state.playerName||'')}" oninput="state.playerName=this.value" class="w-full px-4 py-2 border rounded" placeholder="Entrez votre nom">
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <button onclick="createGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded">🎮 Créer une partie</button>
            <button onclick="state.screen='join'; render()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded">🔗 Rejoindre une partie</button>
          </div>

          <div class="bg-amber-50 p-4 rounded">
            <h3 class="font-bold mb-2">📖 Règles rapides :</h3>
            <ul class="text-sm space-y-1 text-gray-700">
              <li>• Chaque joueur joue 1 carte par tour</li>
              <li>• Les cartes sont placées dans l'ordre croissant</li>
              <li>• Si vous êtes le 6ème d'une rangée, vous ramassez les 5 cartes (points négatifs)</li>
              <li>• Le joueur avec le moins de points gagne !</li>
            </ul>
          </div>
        </div>
      </div>
    `;
    return;
  }

  // JOIN
  if (state.screen === 'join') {
    app.innerHTML = `
      <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-2xl p-8">
          <h2 class="text-2xl font-bold text-center mb-4">Rejoindre une partie</h2>
          <div class="mb-4">
            <label class="block text-sm mb-2">Code de la partie</label>
            <input type="text" value="${escapeHtml(state.joinCode||'')}" oninput="state.joinCode=this.value.toUpperCase()" class="w-full px-4 py-2 border rounded uppercase" placeholder="Ex: ABC123">
          </div>
          <button onclick="joinGame()" class="w-full bg-blue-500 text-white py-2 rounded mb-3">Rejoindre</button>
          <button onclick="state.screen='home'; render()" class="w-full bg-gray-200 text-gray-800 py-2 rounded">Retour</button>
        </div>
      </div>
    `;
    return;
  }

  // LOBBY
  if (state.screen === 'lobby') {
    const isHost = state.game.hostId === state.playerId;
    const canStart = isHost && state.game.players.length >= 2 && state.game.players.every(p => p.ready);
    app.innerHTML = `
      <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-6">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold" style="color:var(--accent)">Salon d'attente</h2>
            <div class="flex gap-2">
              <button onclick="copyLink()" class="bg-blue-500 text-white px-3 py-1 rounded">${state.copied ? '✓ Copié !' : '📋 Copier le lien'}</button>
              <button onclick="leaveGame()" class="bg-red-500 text-white px-3 py-1 rounded">Quitter</button>
            </div>
          </div>

          <div class="mb-4">
            <div class="bg-amber-50 p-3 rounded">
              <div class="flex justify-between items-center">
                <div><small class="text-gray-600">Code de la partie</small><div class="text-lg font-bold">${escapeHtml(state.gameCode)}</div></div>
                <div class="text-right"><small class="text-gray-500">Joueurs</small><div class="font-bold">${state.game.players.length}</div></div>
              </div>
            </div>
          </div>

          <div class="mb-4 grid grid-cols-1 md:grid-cols-2 gap-2">
            ${state.game.players.map(p => `
              <div class="bg-gray-100 p-3 rounded flex justify-between items-center">
                <div>
                  <div class="font-semibold">${escapeHtml(p.name)}</div>
                  ${p.id === state.game.hostId ? '<span class="text-xs bg-orange-500 text-white px-2 py-0.5 rounded">Hôte</span>' : ''}
                </div>
                <div class="text-2xl">${p.ready ? '✅' : '⏳'}</div>
              </div>
            `).join('')}
          </div>

          <div class="flex gap-3">
            <button onclick="toggleReady()" class="flex-1 ${state.game.players.find(x=>x.id===state.playerId).ready ? 'bg-gray-300' : 'bg-green-500 text-white'} py-2 rounded">
              ${state.game.players.find(x=>x.id===state.playerId).ready ? 'Pas prêt' : 'Je suis prêt !'}
            </button>
            ${isHost ? `<button onclick="startGame()" class="flex-1 ${canStart ? 'bg-orange-500 text-white' : 'bg-gray-300 text-gray-600'} py-2 rounded" ${!canStart ? 'disabled' : ''}>🚀 Lancer la partie</button>` : ''}
          </div>
          ${isHost && !canStart ? '<p class="text-sm text-red-500 mt-2">Tous les joueurs doivent être prêts (min. 2)</p>' : ''}
        </div>
      </div>
    `;
    return;
  }

  // GAME
  if (state.screen === 'game') {
    const me = state.game.players.find(x => x.id === state.playerId);
    const waitingPlayers = state.game.players.filter(p => !hasPlayed(p)).map(p => p.name);

    // debug helper
    console.log('Rendering game - waitingForRowChoice:', state.game.waitingForRowChoice, 'myId:', state.playerId);

    if (state.game.status === 'finished') {
      const winner = state.game.players.reduce((min, p) => p.score < min.score ? p : min);
      app.innerHTML = `
        <div class="container mx-auto px-4 py-8">
          <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-8 text-center">
            <h1 class="text-3xl font-bold text-green-600">🎉 Partie terminée !</h1>
            <h2 class="text-xl">🏆 ${escapeHtml(winner.name)} gagne avec ${winner.score} points !</h2>
            <div class="mt-6">${state.game.players.sort((a,b)=>a.score-b.score).map((p,i)=>`<div class="bg-gray-100 p-3 rounded mb-2 flex justify-between"><div>${i===0?'🥇':i===1?'🥈':i===2?'🥉':''} ${escapeHtml(p.name)}</div><div class="font-bold">${p.score} 🐮</div></div>`).join('')}</div>
            <button onclick="leaveGame()" class="mt-4 bg-orange-500 text-white px-4 py-2 rounded">Retour à l'accueil</button>
          </div>
        </div>
      `;
      return;
    }

    app.innerHTML = `
      <div class="container mx-auto px-4 py-4">
        <div class="max-w-6xl mx-auto">
          <!-- Header -->
          <div class="bg-white rounded-lg shadow p-4 mb-4 flex justify-between items-center">
            <div>
              <h2 class="text-lg font-bold" style="color:var(--accent)">Manche ${state.game.round}/${state.game.maxRounds} - Tour ${state.game.currentTurn}/10</h2>
              <p class="text-sm text-gray-600">Code: ${escapeHtml(state.gameCode)}</p>
            </div>
            <div class="flex gap-2 items-center">
              <button onclick="state.showDebug = !state.showDebug; render()" class="debug-btn px-3 py-1 rounded">${state.showDebug ? '📊 Masquer Debug' : '🔍 Debug'}</button>
              <button onclick="leaveGame()" class="bg-red-500 text-white px-3 py-1 rounded">Quitter</button>
            </div>
          </div>

          ${state.showDebug ? `
          <div class="bg-gray-900 text-green-400 rounded-lg p-4 mb-4 font-mono text-xs max-h-80 overflow-y-auto">
            <div class="flex justify-between items-center mb-2">
              <div class="font-bold text-white">📊 Console de Debug (local)</div>
              <div><button onclick="state.debugLogs=[]; render()" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Effacer</button></div>
            </div>
            <div>
              ${state.debugLogs.length === 0 ? '<div class="text-gray-500">Aucun log...</div>' : state.debugLogs.map(l => `<div class="border-b border-gray-700 py-1"><span class="text-gray-400">[${l.time}]</span> <span class="text-yellow-300">${escapeHtml(l.message)}</span>${l.data?`<div class="pl-3 text-blue-300">${escapeHtml(l.data)}</div>`:''}</div>`).join('')}
            </div>
          </div>` : ''}

          <!-- Scores -->
          <div class="bg-white rounded-lg shadow p-4 mb-4">
            <div class="grid grid-cols-2 md:grid-cols-${state.game.players.length} gap-2">
              ${state.game.players.map(p => `
                <div class="text-center p-2 rounded ${p.id === state.playerId ? 'bg-orange-100' : 'bg-gray-100'}">
                  <div class="font-semibold">${escapeHtml(p.name)}</div>
                  <div class="text-2xl font-bold">${p.score} 🐮</div>
                  ${hasPlayed(p) ? '<div class="text-green-500 text-sm">✓ Joué</div>' : '<div class="text-gray-400 text-sm">En attente...</div>'}
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Rows -->
          <div class="bg-white rounded-lg shadow p-6 mb-4">
            <h3 class="font-bold mb-4 text-lg">Rangées de cartes :</h3>
            ${state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId ? 
              `<div class="bg-orange-100 border-2 border-orange-500 rounded-lg p-4 mb-4 text-center font-bold text-orange-700">⚠️ Votre carte est trop petite ! Choisissez une rangée à ramasser en cliquant dessus :</div>` 
              : state.game.waitingForRowChoice ? 
              `<div class="bg-blue-100 border-2 border-blue-500 rounded-lg p-4 mb-4 text-center font-bold text-blue-700">⏳ ${escapeHtml(state.game.players.find(p=>p.id===state.game.waitingForRowChoice)?.name || 'Joueur')} doit choisir une rangée...</div>`
              : ''}
            <div class="space-y-3">
              ${state.game.rows.map((row,i) => {
                const totalHeads = row.reduce((s,c)=> s + calculateHeads(c),0);
                const canClick = state.game.waitingForRowChoice && state.game.waitingForRowChoice === state.playerId;
                return `<div class="flex items-center gap-2 ${canClick ? 'cursor-pointer hover:bg-orange-50 border-2 border-transparent hover:border-orange-500 rounded p-2' : ''}" ${canClick ? 'onclick="chooseRow(' + i + ')"' : ''}>
                  <span class="font-bold text-gray-600 min-w-[40px]">R${i+1}:</span>
                  <div class="flex gap-1 flex-wrap flex-1">${row.map(c=> Card(c,false,false,true,true)).join('')}</div>
                  <span class="text-sm font-semibold text-gray-700 bg-gray-100 px-3 py-1 rounded">${row.length}/5 | ${totalHeads} 🐮</span>
                </div>`;
              }).join('')}
            </div>
          </div>

          <!-- Player hand -->
          <div class="bg-white rounded-lg shadow p-6">
            <h3 class="font-bold mb-4 text-lg">Votre main :</h3>
            ${hasPlayed(me) ? `
              <div class="text-center py-8">
                <p class="text-xl mb-4">✓ Vous avez joué votre carte !</p>
                <p class="text-gray-600">En attente des autres joueurs...</p>
                ${waitingPlayers.length ? `<p class="text-sm text-gray-500 mt-2">Attente de : ${escapeHtml(waitingPlayers.join(', '))}</p>` : ''}
              </div>
            ` : `
              <div class="flex gap-2 flex-wrap justify-center">
                ${me.hand.map(c => Card(c, state.selectedCard === c, true, false, false)).join('')}
              </div>
              ${state.selectedCard ? '<p class="text-center mt-4 text-sm text-gray-600">Cliquez à nouveau pour confirmer</p>' : '<p class="text-center mt-4 text-sm text-gray-600">Choisissez une carte</p>'}
            `}
          </div>
        </div>
      </div>
    `;
    return;
  }
};

/* small helper to avoid injection when injecting strings into HTML templates */
function escapeHtml(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

/* Init */
document.addEventListener('DOMContentLoaded', () => {
  // extract join param
  const p = new URLSearchParams(window.location.search);
  const j = p.get('join');
  if (j) state.joinCode = j;
  console.info('App loaded', { joinParam: j });
  render();
});
</script>
</body>
