<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 qui prend ! - Jeu en ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap');
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-100 to-orange-200 min-h-screen">
    <div id="app"></div>
    
    <div id="config-alert" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg hidden z-50">
        ⚠️ Firebase non configuré ! Suivez les instructions ci-dessous.
    </div>

    <script>
        /* 
        🔥 INSTRUCTIONS DE CONFIGURATION FIREBASE
        
        1. Allez sur https://console.firebase.google.com
        2. Créez un nouveau projet (gratuit)
        3. Cliquez sur "Web" (icône </>)
        4. Activez "Realtime Database" dans le menu
        5. Copiez votre configuration ici :
        */
        
        const firebaseConfig = {
            apiKey: "AIzaSyC2YfNviAE_jDD0wT7TmfZBeOaKqjJdJuQ",
            authDomain: "quiprend-879a6.firebaseapp.com",
            databaseURL: "https://quiprend-879a6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "quiprend-879a6",
            storageBucket: "quiprend-879a6.firebasestorage.app",
            messagingSenderId: "476103541469",
            appId: "1:476103541469:web:3a0ac76f9bde94b1745134"
        };

        const isConfigured = firebaseConfig.apiKey !== "VOTRE_API_KEY";
        let database = null;
        
        if (!isConfigured) {
            document.getElementById('config-alert').classList.remove('hidden');
        } else {
            try {
                firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                console.log('✅ Firebase OK');
            } catch (e) {
                alert('Erreur Firebase: ' + e.message);
            }
        }

        let state = {
            screen: 'home',
            gameCode: '',
            playerName: '',
            joinCode: '',
            game: null,
            playerId: null,
            selectedCard: null,
            chatMessage: '',
            showChat: false,
            copied: false
        };

        let gameRef = null;

        const generateGameCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        
        const calculateHeads = (card) => {
            if (card === 55) return 7;
            if (card % 11 === 0) return 5;
            if (card % 10 === 0) return 3;
            if (card % 5 === 0) return 2;
            return 1;
        };

        const getCardColor = (card) => {
            if (card <= 26) return 'bg-blue-400';
            if (card <= 52) return 'bg-green-400';
            if (card <= 78) return 'bg-yellow-400';
            return 'bg-red-400';
        };

        const shuffleDeck = () => {
            const deck = Array.from({ length: 104 }, (_, i) => i + 1);
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        };

        const saveGame = async (data) => {
            if (!database) return;
            await database.ref('games/' + state.gameCode).set(data);
            state.game = data;
        };

        const subscribeToGame = (code) => {
            if (!database) return;
            if (gameRef) gameRef.off();
            gameRef = database.ref('games/' + code);
            gameRef.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    state.game = data;
                    render();
                }
            });
        };

        const createGame = async () => {
            if (!state.playerName.trim() || !database) {
                alert('Entrez un pseudo et configurez Firebase !');
                return;
            }
            
            const code = generateGameCode();
            const pid = Math.random().toString(36).substring(7);
            
            state.gameCode = code;
            state.playerId = pid;
            
            await saveGame({
                code,
                status: 'waiting',
                hostId: pid,
                players: [{
                    id: pid,
                    name: state.playerName,
                    score: 0,
                    ready: false,
                    hand: [],
                    playedCard: null
                }],
                rows: [],
                round: 0,
                chat: [],
                currentTurn: 0,
                maxRounds: 6
            });
            
            subscribeToGame(code);
            state.screen = 'lobby';
            render();
        };

        const joinGame = async () => {
            if (!state.playerName.trim() || !state.joinCode.trim() || !database) {
                alert('Entrez pseudo et code !');
                return;
            }
            
            const snap = await database.ref('games/' + state.joinCode.toUpperCase()).once('value');
            const game = snap.val();
            
            if (!game) {
                alert('Partie introuvable !');
                return;
            }
            if (game.status !== 'waiting') {
                alert('Partie déjà commencée !');
                return;
            }
            
            const pid = Math.random().toString(36).substring(7);
            game.players.push({
                id: pid,
                name: state.playerName,
                score: 0,
                ready: false,
                hand: [],
                playedCard: null
            });

            state.gameCode = state.joinCode.toUpperCase();
            state.playerId = pid;
            await saveGame(game);
            subscribeToGame(state.gameCode);
            state.screen = 'lobby';
            render();
        };

        const toggleReady = async () => {
            const p = state.game.players.find(x => x.id === state.playerId);
            p.ready = !p.ready;
            await saveGame(state.game);
        };

        const startGame = async () => {
            if (state.game.hostId !== state.playerId || state.game.players.length < 2) return;
            if (!state.game.players.every(p => p.ready)) {
                alert('Tous doivent être prêts !');
                return;
            }

            const deck = shuffleDeck();
            state.game.rows = [[deck.shift()], [deck.shift()], [deck.shift()], [deck.shift()]];
            state.game.players.forEach(p => {
                p.hand = deck.splice(0, 10).sort((a, b) => a - b);
                p.playedCard = null;
            });
            state.game.status = 'playing';
            state.game.round = 1;
            state.game.currentTurn = 1;

            await saveGame(state.game);
            state.screen = 'game';
            render();
        };

        const playCard = async (card) => {
            const p = state.game.players.find(x => x.id === state.playerId);
            if (p.playedCard) return;
            
            p.playedCard = card;
            p.hand = p.hand.filter(c => c !== card);
            await saveGame(state.game);
            state.selectedCard = null;

            if (state.game.players.every(x => x.playedCard) && state.game.hostId === state.playerId) {
                setTimeout(() => resolveTurn(), 1500);
            }
        };

        const resolveTurn = async () => {
            const snap = await database.ref('games/' + state.gameCode).once('value');
            const game = snap.val();
            
            const plays = game.players.map(p => ({ pid: p.id, card: p.playedCard })).sort((a, b) => a.card - b.card);

            for (const play of plays) {
                const p = game.players.find(x => x.id === play.pid);
                const valid = game.rows.map((r, i) => ({ i, last: r[r.length - 1], diff: play.card - r[r.length - 1] })).filter(x => x.diff > 0);

                if (!valid.length) {
                    const pen = game.rows[0];
                    p.score += pen.reduce((s, c) => s + calculateHeads(c), 0);
                    game.rows[0] = [play.card];
                } else {
                    const t = valid.reduce((min, cur) => cur.diff < min.diff ? cur : min);
                    if (game.rows[t.i].length === 5) {
                        const pen = game.rows[t.i];
                        p.score += pen.reduce((s, c) => s + calculateHeads(c), 0);
                        game.rows[t.i] = [play.card];
                    } else {
                        game.rows[t.i].push(play.card);
                    }
                }
                p.playedCard = null;
            }

            game.currentTurn++;
            if (game.currentTurn > 10) {
                game.round++;
                if (game.round > game.maxRounds) {
                    game.status = 'finished';
                } else {
                    const deck = shuffleDeck();
                    game.rows = [[deck.shift()], [deck.shift()], [deck.shift()], [deck.shift()]];
                    game.players.forEach(p => { p.hand = deck.splice(0, 10).sort((a, b) => a - b); });
                    game.currentTurn = 1;
                }
            }
            await saveGame(game);
        };

        const sendMessage = async () => {
            if (!state.chatMessage.trim()) return;
            const p = state.game.players.find(x => x.id === state.playerId);
            state.game.chat = state.game.chat || [];
            state.game.chat.push({ player: p.name, msg: state.chatMessage, time: new Date().toLocaleTimeString() });
            state.chatMessage = '';
            await saveGame(state.game);
            render();
        };

        const copyLink = () => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?join=' + state.gameCode);
            state.copied = true;
            render();
            setTimeout(() => { state.copied = false; render(); }, 2000);
        };

        const leaveGame = () => {
            if (gameRef) gameRef.off();
            state.screen = 'home';
            state.game = null;
            state.gameCode = '';
            render();
        };

        const Card = (num, sel, click, dis, small) => {
            const h = calculateHeads(num);
            const col = getCardColor(num);
            const sz = small ? 'w-12 h-16 text-xs' : 'w-16 h-24 text-sm';
            return `<button ${click ? 'onclick="handleCard(' + num + ')"' : ''} ${dis ? 'disabled' : ''} class="${sz} ${col} text-white rounded-lg shadow-md flex flex-col items-center justify-between p-1 transition ${sel ? 'ring-4 ring-blue-600 scale-105' : ''} ${!dis && !sel ? 'hover:scale-105 cursor-pointer' : ''} ${dis ? 'opacity-50' : ''} font-bold"><span class="text-xl">${num}</span><div>${'🐮'.repeat(h)}</div></button>`;
        };

        window.handleCard = (c) => {
            const p = state.game.players.find(x => x.id === state.playerId);
            if (p.playedCard) return;
            if (state.selectedCard === c) playCard(c);
            else { state.selectedCard = c; render(); }
        };

        const render = () => {
            const app = document.getElementById('app');
            if (state.screen === 'home') {
                app.innerHTML = `<div class="min-h-screen p-8 flex items-center justify-center"><div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8"><div class="text-center mb-8"><h1 class="text-4xl font-bold text-orange-600 mb-2">🐮 6 qui prend !</h1><p class="text-gray-600">Jouez en ligne avec vos amis</p></div><div class="space-y-4"><input type="text" id="playerName" placeholder="Votre pseudo" class="w-full px-4 py-3 border-2 rounded-lg" maxlength="15"><button onclick="createGame()" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600">🎮 Créer une partie</button><div class="relative"><div class="absolute inset-0 flex items-center"><div class="w-full border-t"></div></div><div class="relative flex justify-center text-sm"><span class="px-2 bg-white text-gray-500">ou</span></div></div><input type="text" id="joinCode" placeholder="Code de la partie" class="w-full px-4 py-3 border-2 rounded-lg uppercase" maxlength="6"><button onclick="joinGame()" class="w-full bg-blue-500 text-white py-3 rounded-lg font-semibold hover:bg-blue-600">👥 Rejoindre</button></div></div></div>`;
                document.getElementById('playerName').value = state.playerName;
                document.getElementById('playerName').oninput = (e) => state.playerName = e.target.value;
                document.getElementById('joinCode').value = state.joinCode;
                document.getElementById('joinCode').oninput = (e) => state.joinCode = e.target.value.toUpperCase();
            } else if (state.screen === 'lobby') {
                app.innerHTML = `<div class="min-h-screen p-8 flex items-center justify-center"><div class="max-w-2xl w-full bg-white rounded-2xl shadow-2xl p-8"><div class="text-center mb-6"><h2 class="text-3xl font-bold text-orange-600 mb-2">Salon d'attente</h2><div class="flex items-center justify-center gap-2"><span class="text-xl font-mono bg-gray-100 px-4 py-2 rounded-lg">${state.gameCode}</span><button onclick="copyLink()" class="p-2 hover:bg-gray-100 rounded-lg">${state.copied ? '✅' : '📋'}</button></div></div><div class="space-y-3 mb-6">${state.game.players.map(p => `<div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg"><div class="flex items-center gap-3">${p.id === state.game.hostId ? '👑' : ''}<span class="font-semibold">${p.name}</span>${p.id === state.playerId ? '<span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">Vous</span>' : ''}</div><div>${p.ready ? '<span class="text-green-500 font-semibold">✓</span>' : '<span class="text-gray-400">...</span>'}</div></div>`).join('')}</div><div class="space-y-3"><button onclick="toggleReady()" class="w-full py-3 rounded-lg font-semibold ${state.game.players.find(p => p.id === state.playerId)?.ready ? 'bg-gray-300' : 'bg-green-500 text-white'}">Prêt</button>${state.game.hostId === state.playerId ? '<button onclick="startGame()" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold">Démarrer</button>' : ''}<button onclick="leaveGame()" class="w-full bg-gray-200 py-2 rounded-lg">Quitter</button></div></div></div>`;
            } else if (state.screen === 'game') {
                const me = state.game.players.find(p => p.id === state.playerId);
                const all = state.game.players.every(p => p.playedCard);
                if (state.game.status === 'finished') {
                    const w = state.game.players.reduce((m, p) => p.score < m.score ? p : m);
                    app.innerHTML = `<div class="min-h-screen p-8 flex items-center justify-center"><div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md text-center"><h2 class="text-4xl font-bold text-orange-600 mb-6">🏆 Fini !</h2><p class="text-2xl font-bold text-green-600 mb-2">${w.name} gagne !</p><p class="text-gray-600 mb-6">${w.score} têtes</p><div class="space-y-2 mb-6">${state.game.players.sort((a, b) => a.score - b.score).map((p, i) => `<div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span>#${i + 1} ${p.name}</span><span>${p.score} 🐮</span></div>`).join('')}</div><button onclick="leaveGame()" class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold">Nouvelle partie</button></div></div>`;
                } else {
                    const appContent = `<div class="min-h-screen p-4"><div class="max-w-7xl mx-auto"><div class="bg-white rounded-xl shadow-lg p-4 mb-4 flex justify-between items-center"><div><h3 class="text-xl font-bold text-orange-600">Manche ${state.game.round}/${state.game.maxRounds}</h3><p class="text-sm text-gray-600">Tour ${state.game.currentTurn}/10</p></div><div class="flex gap-2"><button onclick="state.showChat=!state.showChat;render()" class="p-2 hover:bg-gray-100 rounded-lg">💬</button><button onclick="if(confirm('Quitter?'))leaveGame()" class="p-2 hover:bg-gray-100 rounded-lg">❌</button></div></div><div class="grid grid-cols-1 lg:grid-cols-4 gap-4"><div class="lg:col-span-3 space-y-4"><div class="bg-white rounded-xl shadow-lg p-6"><h4 class="text-lg font-semibold mb-4">Rangées</h4>${state.game.rows.map((r, i) => `<div class="flex gap-2 items-center mb-2"><span class="text-sm font-semibold w-8">#${i + 1}</span><div class="flex gap-1">${r.map(c => Card(c, false, false, true, true)).join('')}</div></div>`).join('')}</div><div class="bg-white rounded-xl shadow-lg p-6"><div class="flex justify-between mb-4"><h4 class="text-lg font-semibold">Votre main</h4>${all ? '<span class="text-green-600 pulse">⏳</span>' : me.playedCard ? '<span class="text-blue-600">✓ Carte ' + me.playedCard + '</span>' : '<span class="text-orange-600">👉 Choisissez</span>'}</div><div class="flex gap-2 flex-wrap justify-center">${me.hand.map(c => Card(c, state.selectedCard === c, true, me.playedCard)).join('')}</div>${state.selectedCard && !me.playedCard ? '<div class="mt-4 text-center"><button onclick="playCard(' + state.selectedCard + ')" class="bg-green-500 text-white px-6 py-2 rounded-lg font-semibold">Jouer ' + state.selectedCard + '</button></div>' : ''}</div></div><div class="space-y-4"><div class="bg-white rounded-xl shadow-lg p-4"><h4 class="text-lg font-semibold mb-3">Joueurs</h4>${state.game.players.sort((a, b) => a.score - b.score).map(p => `<div class="p-3 rounded-lg mb-2 ${p.id === state.playerId ? 'bg-blue-50 border-2 border-blue-300' : 'bg-gray-50'}"><div class="flex justify-between mb-1"><div>${p.id === state.game.hostId ? '👑' : ''} <span class="font-semibold text-sm">${p.name}</span></div>${p.playedCard ? '<span class="text-green-500">✓</span>' : ''}</div><div class="flex justify-between text-xs text-gray-600"><span>${p.score} 🐮</span><span>${p.hand.length} cartes</span></div></div>`).join('')}</div>${state.showChat ? `<div class="bg-white rounded-xl shadow-lg p-4"><h4 class="font-semibold mb-2">Chat</h4><div class="h-32 overflow-y-auto mb-2 space-y-1">${(state.game.chat || []).map(m => '<div class="text-xs"><span class="font-semibold text-blue-600">' + m.player + ':</span> ' + m.msg + '</div>').join('')}</div><div class="flex gap-2"><input type="text" id="chatInput" placeholder="Message..." class="flex-1 px-3 py-2 border rounded-lg text-sm" maxlength="100"><button onclick="sendMessage()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm">→</button></div></div>` : ''}</div></div></div>`;
                    app.innerHTML = appContent;
                    if (state.showChat) {
                        document.getElementById('chatInput').value = state.chatMessage;
                        document.getElementById('chatInput').oninput = (e) => state.chatMessage = e.target.value;
                        document.getElementById('chatInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
                    }
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const p = new URLSearchParams(window.location.search);
            const j = p.get('join');
            if (j) state.joinCode = j;
            render();
        });
    </script>
</body>
</html>
